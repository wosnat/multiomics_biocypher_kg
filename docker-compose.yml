version: '3.3'

services:

  build:
    image: biocypher/base:1.2.0
    container_name: build
    network_mode: host
    volumes:
      - biocypher_neo4j_volume:/usr/app/data
      - .:/src/
    command:
      - /bin/bash
      - /src/scripts/build.sh
    environment:
      BUILD2NEO_CLEANUP: "yes"
      # Set to "yes" to include GO/EC hierarchy nodes and edges
      BUILD_GO: "no"
      BUILD_EC: "no"

  import:
    image: neo4j:5.15-community
    container_name: import
    environment:
      NEO4J_AUTH: none
    volumes:
      - biocypher_neo4j_volume:/data
      - ./scripts/import.sh:/scripts/import.sh
      - ./output:/output
    command:
      - /bin/bash
      - /scripts/import.sh
    depends_on:
      build:
        condition: service_completed_successfully

  post-process:
    image: neo4j:5.15-community
    container_name: post-process
    volumes:
      - biocypher_neo4j_volume:/data
      - ./scripts/post-import.cypher:/scripts/post-import.cypher
      - ./scripts/post-import.sh:/scripts/post-import.sh
    environment:
      NEO4J_AUTH: none
      NEO4J_dbms_security_auth__enabled: "false"
      NEO4J_server_memory_heap_initial__size: "2G"
      NEO4J_server_memory_heap_max__size: "4G"
    command:
      - /bin/bash
      - /scripts/post-import.sh
    depends_on:
      import:
        condition: service_completed_successfully

  deploy:
    image: neo4j:5.15-community
    container_name: deploy
    volumes:
      - biocypher_neo4j_volume:/data
    environment:
      NEO4J_dbms_security_auth__enabled: "false"
      NEO4J_server_memory_heap_initial__size: "1G"
      NEO4J_server_memory_heap_max__size: "2G"
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    networks:
      - biochatter
    depends_on:
      post-process:
        condition: service_completed_successfully

  app:
    image: biocypher/biochatter-light:0.6.13
    container_name: app
    ports:
      - "8501:8501"
    networks:
      - biochatter
    depends_on:
      import:
        condition: service_completed_successfully
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DOCKER_COMPOSE=true
      - CHAT_TAB=false
      - PROMPT_ENGINEERING_TAB=false
      - RAG_TAB=false
      - CORRECTING_AGENT_TAB=false
      - KNOWLEDGE_GRAPH_TAB=true


volumes:
  biocypher_neo4j_volume:

networks:
  biochatter: