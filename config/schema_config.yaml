# ---
# "Named Things"
# ---
   
gene:
  represented_as: node
  preferred_id: ncbigene
  label_in_input: gene
  properties:
    locus_tag: str
    start: int
    end: int
    strand: str
    product: str
    protein_id: str
    # Denormalized from linked Protein node during post-import (set via Cypher, not adapter):
    function_description: str      # UniProt functional description; present for all organisms
    # Gene naming (canonical)
    gene_name: str                    # canonical name (dnaN, rpoA, etc.)
    gene_name_synonyms: str[]         # gene-name-like tokens only (dnaN, purF, etc.)
    alternate_functional_descriptions: str[]  # all-source descriptions for LLM use: "[source] text"
    protein_family: str               # protein family name
    # Specialized function
    catalytic_activities: str[]
    transmembrane_regions: str[]
    signal_peptide: str
    transporter_classification: str[]
    cazy_ids: str[]
    bigg_reaction: str[]
    # Computed fields for MCP gene lookup
    organism_strain: str              # preferred organism name (e.g., "Prochlorococcus MED4")
    gene_summary: str                 # "gene_name :: product :: description"
    all_identifiers: str[]            # union of all alt IDs for single-array get_gene lookup
    # Quality
    annotation_quality: int           # 0=hypothetical-no-func, 1=hypothetical-with-func, 2=real-product, 3=real-product+structured
    gene_category: str                # high-level functional classification (26 controlled values, from Cyanorak/TIGR/COG)
    # Routing signals (pre-computed by post-import Cypher, not by adapter)
    annotation_types: str[]           # ontology edge types with >0 edges, e.g. ["go_bp", "go_mf", "pfam"]
    expression_edge_count: int        # total expression edges (Condition + Coculture)
    significant_expression_count: int # expression edges where significant = 'significant'
    closest_ortholog_group_size: int  # member_count from most specific OG (lowest specificity_rank)
    closest_ortholog_genera: str[]    # genera from most specific OG

# consider adding: Note, exceptions, inference




protein:
  represented_as: node
  preferred_id: uniprot
  label_in_input: protein
  properties:
    sequence_length: int
    molecular_mass: int
    protein_synonyms: str        # full protein name string from UniProt
    proteome_ids: str[]
    gene_names: str[]
    gene_symbol: str
    ec_numbers: str[]
    subcellular_location: str
    locus_tag: str
    catalytic_activities: str[]
    cofactor_names: str[]
    function_description: str
    pathways: str[]
    annotation_score: float
    caution_notes: str
    keyword_ids: str[]
    keywords: str[]
    is_reviewed: str
    interaction_notes: str
    go_cellular_components: str[]
    go_biological_processes: str[]
    go_molecular_functions: str[]
    transmembrane_regions: str[]
    signal_peptide: str
    domain_description: str
    functional_motifs: str
    protein_family: str
    refseq_ids: str[]
    string_ids: str
    eggnog_ids: str
    pfam_ids: str[]

  
organism taxon:
  represented_as: node
  preferred_id: insdc.gcf
  label_in_input: organism
  properties:
    organism_name: str
    preferred_name: str  # human-readable name, e.g. "Prochlorococcus MED4", "Alteromonas macleodii HOT1A3"
    strain_name: str
    ncbi_taxon_id: int
    clade: str           # research clade, e.g. HLI, HLII, LLIV (Prochlorococcus-specific)
    lineage: str         # full NCBI lineage string
    superkingdom: str    # e.g. Bacteria
    kingdom: str         # e.g. Bacillati
    phylum: str          # e.g. Cyanobacteriota
    tax_class: str       # e.g. Cyanophyceae
    order: str           # e.g. Synechococcales
    family: str          # e.g. Prochlorococcaceae
    genus: str           # e.g. Prochlorococcus
    species: str         # e.g. Prochlorococcus marinus

environmental condition:
  is_a: EnvironmentalFeature
  represented_as: node
  preferred_id: id
  label_in_input: environmental_condition
  properties:
    name: str
    condition_type: str  # "gas_shock" | "nutrient_stress" | "light_stress"
    condition_category: str  # same value as condition_type; canonical vocabulary for querying

    # Growth conditions
    medium: str            # e.g., "Pro99", "PRO99-lowN", "PEv medium"
    temperature: str       # e.g., "24C", "21C"

    # Gas parameters
    oxygen_level: str      # e.g., "0%", "21%", "depleted"
    co2_level: str         # e.g., "0%", "ambient"

    # Nutrient parameters
    nitrogen_source: str   # e.g., "ammonia", "nitrate", "none"
    nitrogen_level: str    # e.g., "replete", "limited", "starved"
    phosphate_level: str   # e.g., "replete", "limited", "starved"

    # Light parameters
    light_condition: str   # e.g., "darkness", "blue", "red", "white"
    light_intensity: str   # e.g., "0", "low", "high"

    description: str
    publications: str[]

protein domain:  
  represented_as: node
  preferred_id: interpro
  label_in_input: domain
  properties:    
    protein_count: int
    name: str
    type: str
    parent_list: str[]
    child_list: str[]
    pfam: str[]
    ec: str[]
    pdb: str[]
    
biological process:
  is_a: gene ontology
  represented_as: node
  preferred_id: go
  label_in_input: biological process
  properties:
    name: str
    anc2vec_embedding: float[]
  
cellular component:
  represented_as: node
  preferred_id: go
  label_in_input: cellular component
  properties:
    name: str
    anc2vec_embedding: float[]

molecular function:
