# ---
# "Named Things"
# ---
   
gene:
  represented_as: node
  preferred_id: ncbigene
  label_in_input: gene
  properties:
    locus_tag: str
    start: int
    end: int
    strand: str
    contig: str                      # chromosome / contig name from GFF seqid
    product: str
    protein_id: str
    sequence: str                   # AA sequence string from per-strain NCBI protein.faa, joined via protein_id
    # Denormalized from linked Protein node during post-import (set via Cypher, not adapter):
    function_description: str      # UniProt functional description; present for all organisms
    # Gene naming (canonical)
    gene_name: str                    # canonical name (dnaN, rpoA, etc.)
    gene_name_synonyms: str[]         # gene-name-like tokens only (dnaN, purF, etc.)
    alternate_functional_descriptions: str[]  # all-source descriptions for LLM use: "[source] text"
    protein_family: str               # protein family name
    # Specialized function
    catalytic_activities: str[]
    transmembrane_regions: str[]
    signal_peptide: str
    bigg_reaction: str[]
    # Computed fields for MCP gene lookup
    organism_name: str              # preferred organism name (e.g., "Prochlorococcus MED4")
    gene_summary: str                 # "gene_name :: product :: description"
    all_identifiers: str[]            # union of all alt IDs for single-array get_gene lookup
    # Quality
    annotation_quality: int           # 0=hypothetical-no-func, 1=hypothetical-with-func, 2=real-product, 3=real-product+structured
    gene_category: str                # high-level functional classification (26 controlled values, from Cyanorak/TIGR/COG)
    # Routing signals (pre-computed by post-import Cypher, not by adapter)
    annotation_types: str[]           # ontology edge types with >0 edges, e.g. ["go_bp", "go_mf", "pfam"]
    expression_edge_count: int        # total Changes_expression_of edges
    significant_up_count: int         # expression edges where expression_status = 'significant_up'
    significant_down_count: int       # expression edges where expression_status = 'significant_down'
    reaction_count: int               # post-import: count of Gene_catalyzes_reaction edges (KG-A1)
    closest_ortholog_group_size: int  # member_count from most specific OG (lowest specificity_rank)
    closest_ortholog_genera: str[]    # genera from most specific OG
    numeric_metric_count: int                # post-import (Plan 3): distinct DMs reaching via quantifies_gene
    boolean_metric_count: int                # post-import (Plan 3): distinct DMs reaching via flags_gene
    categorical_metric_count: int            # post-import (Plan 3): distinct DMs reaching via classifies_gene
    numeric_metric_types_observed: str[]     # post-import (Plan 3): sorted distinct metric_type over quantifies
    boolean_metric_types_observed: str[]     # post-import (Plan 3): sorted distinct metric_type over flags
    categorical_metric_types_observed: str[] # post-import (Plan 3): sorted distinct metric_type over classifies
    compartments_observed: str[]             # post-import (Plan 3): sorted distinct compartment over all 3 DM edge types
    # TCDB / CAZy / chemistry rollups (post-import)
    tcdb_family_count: int                   # per TCDB-S1
    cazy_family_count: int                   # per TCDB-S2
    metabolite_count: int                    # UNION catalysis + transport (per TCDB-S3 / KG-A2)

