#Title: BioCypher graph schema configuration file for multi-omics studies
#Version: 1.0
#Author: Osnat Weissberg
#Date: 2024-06-10
#########################################
# Publication and Expression Edges
#########################################

publication:
  is_a: Publication
  represented_as: node
  preferred_id: doi
  label_in_input: publication
  properties:
    title: str
    authors: str[]
    journal: str
    publication_year: int
    doi: str
    pmid: str
    description: str
    abstract: str
    study_type: str # e.g., Transcriptomics, Proteomics
    organism: str[]


# Expression edges: source (cause) -> gene (affected)
# Four edge types: direct (condition or coculture) and inferred via homology (ortholog variants).
# Direct edges are created by the omics adapter; ortholog edges are created by post-import Cypher.

# Coculture (organism → gene, direct)
coculture to gene expression association:
  is_a: Association
  represented_as: edge
  label_as_edge: coculture_changes_expression_of
  label_in_input: coculture_changes_expression_of
  source: organism_taxon
  target: gene
  properties:
    expression_direction: str      # "up" | "down"
    control_condition: str         # baseline for the varied factor (e.g., "axenic", "light")
    experimental_context: str      # other factors held constant (e.g., "in darkness")
    time_point: str
    log2_fold_change: float
    adjusted_p_value: float
    significant: str               # "significant" | "not significant" | "unknown"
    publications: str[]
    omics_type: str                # RNASEQ | PROTEOMICS | METABOLOMICS | MICROARRAY
    organism_strain: str           # which organism's genes are measured (e.g., "Prochlorococcus MED4")
    treatment_condition: str       # what was applied (e.g., "Coculture with Alteromonas HOT1A3")
    statistical_test: str          # DESeq2, edgeR, etc.
    analysis_name: str             # human-readable name of the statistical comparison (from paperconfig)

# Condition (env condition → gene, direct)
condition to gene expression association:
  is_a: Association
  represented_as: edge
  label_as_edge: condition_changes_expression_of
  label_in_input: condition_changes_expression_of
  source: environmental condition
  target: gene
  properties:
    expression_direction: str      # "up" | "down"
    control_condition: str         # baseline for the varied factor (e.g., "axenic", "light")
    experimental_context: str      # other factors held constant (e.g., "in darkness")
    time_point: str
    log2_fold_change: float
    adjusted_p_value: float
    significant: str               # "significant" | "not significant" | "unknown"
    publications: str[]
    omics_type: str
    organism_strain: str
    treatment_condition: str
    statistical_test: str
    analysis_name: str             # human-readable name of the statistical comparison (from paperconfig)

# Publication connectivity
publication to expression source association:
  is_a: Association
  represented_as: edge
  label_as_edge: published_expression_data_about
  label_in_input: published_expression_data_about
  source: publication
  target: [environmental condition, organism taxon]

ortholog group:
  is_a: GroupingClass
  represented_as: node
  preferred_id: id
  label_in_input: ortholog_group
  properties:
    name: str              # raw OG identifier (e.g., "CK_00000364", "COG0592@2", "1MKTR@1212")
    source: str            # "cyanorak" | "eggnog"
    taxonomic_level: str   # "curated" | "Prochloraceae" | "Alteromonadaceae" | "Bacteria" | etc.
    taxon_id: int          # NCBI taxon ID of the level (0 for curated)
    specificity_rank: int  # 0=curated, 1=family, 2=order, 3=domain (Bacteria)
    consensus_product: str
    consensus_gene_name: str
    member_count: int
    organism_count: int
    genera: str[]
    has_cross_genus_members: str  # "cross_genus" | "single_genus"

gene in ortholog group:
  is_a: Association
  represented_as: edge
  label_as_edge: gene_in_ortholog_group
  source: gene
  target: ortholog group
  label_in_input: gene_in_ortholog_group

timeseries_cluster:
  is_a: GroupingClass
  represented_as: node
  preferred_id: id
  label_in_input: timeseries_cluster
  properties:
    name: str
    method: str # e.g., WGCNA, k-means
    description: str

cluster_in_publication:
  is_a: Association
  represented_as: edge
  label_as_edge: cluster_in_publication
  source: timeseries_cluster
  target: publication
  label_in_input: cluster_in_publication

molecular_in_cluster:
  is_a: Association
  represented_as: edge
  source: [gene, protein]
  target: timeseries_cluster
  label_in_input: member_of_cluster
  




