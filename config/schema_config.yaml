#Title: BioCypher graph schema configuration file for multi-omics studies
#Version: 1.0
#Author: Osnat Weissberg
#Date: 2024-06-10
#########################################
# Publication and Expression Edges
#########################################

publication:
  is_a: Publication
  represented_as: node
  preferred_id: doi
  label_in_input: publication
  properties:
    title: str
    authors: str[]
    journal: str
    publication_year: int
    doi: str
    pmid: str
    description: str
    abstract: str
    study_type: str # e.g., Transcriptomics, Proteomics
    organism: str[]


# Expression edges: source (cause) -> gene (affected)
# Four edge types: direct (condition or coculture) and inferred via homology (ortholog variants).
# Direct edges are created by the omics adapter; ortholog edges are created by post-import Cypher.

# Coculture (organism → gene, direct)
coculture to gene expression association:
  is_a: Association
  represented_as: edge
  label_as_edge: coculture_changes_expression_of
  label_in_input: coculture_changes_expression_of
  source: organism_taxon
  target: gene
  properties:
    expression_direction: str      # "up" | "down"
    control_condition: str         # baseline for the varied factor (e.g., "axenic", "light")
    experimental_context: str      # other factors held constant (e.g., "in darkness")
    time_point: str
    log2_fold_change: float
    adjusted_p_value: float
    significant: boolean           # whether the row meets significance thresholds
    publications: str[]
    omics_type: str                # RNASEQ | PROTEOMICS | METABOLOMICS | MICROARRAY
    organism_strain: str           # which organism's genes are measured (e.g., "MED4")
    treatment_condition: str       # what was applied (e.g., "Coculture with Alteromonas HOT1A3")
    statistical_test: str          # DESeq2, edgeR, etc.
    analysis_name: str             # human-readable name of the statistical comparison (from paperconfig)

# Condition (env condition → gene, direct)
condition to gene expression association:
  is_a: Association
  represented_as: edge
  label_as_edge: condition_changes_expression_of
  label_in_input: condition_changes_expression_of
  source: environmental condition
  target: gene
  properties:
    expression_direction: str      # "up" | "down"
    control_condition: str         # baseline for the varied factor (e.g., "axenic", "light")
    experimental_context: str      # other factors held constant (e.g., "in darkness")
    time_point: str
    log2_fold_change: float
    adjusted_p_value: float
    significant: boolean           # whether the row meets significance thresholds
    publications: str[]
    omics_type: str
    organism_strain: str
    treatment_condition: str
    statistical_test: str
    analysis_name: str             # human-readable name of the statistical comparison (from paperconfig)

# Coculture ortholog (organism → gene, inferred via homology)
coculture to ortholog gene expression association:
  is_a: Association
  represented_as: edge
  label_as_edge: coculture_changes_expression_of_ortholog
  label_in_input: coculture_changes_expression_of_ortholog
  source: organism_taxon
  target: gene
  properties:
    expression_direction: str
    control_condition: str
    experimental_context: str
    time_point: str
    log2_fold_change: float
    adjusted_p_value: float
    significant: boolean
    publications: str[]
    omics_type: str
    organism_strain: str
    treatment_condition: str
    statistical_test: str
    analysis_name: str             # human-readable name of the statistical comparison (from paperconfig)
    original_gene: str             # ID of the gene with the direct expression edge
    homology_source: str           # e.g., "cyanorak_cluster"
    homology_cluster_id: str       # the shared cluster ID
    distance: str                  # phylogenetic distance from homology edge, e.g. "same clade: HLI"

# Condition ortholog (env condition → gene, inferred via homology)
condition to ortholog gene expression association:
  is_a: Association
  represented_as: edge
  label_as_edge: condition_changes_expression_of_ortholog
  label_in_input: condition_changes_expression_of_ortholog
  source: environmental condition
  target: gene
  properties:
    expression_direction: str
    control_condition: str
    experimental_context: str
    time_point: str
    log2_fold_change: float
    adjusted_p_value: float
    significant: boolean
    publications: str[]
    omics_type: str
    organism_strain: str
    treatment_condition: str
    statistical_test: str
    analysis_name: str             # human-readable name of the statistical comparison (from paperconfig)
    original_gene: str             # ID of the gene with the direct expression edge
    homology_source: str           # e.g., "cyanorak_cluster"
    homology_cluster_id: str       # the shared cluster ID
    distance: str                  # phylogenetic distance from homology edge, e.g. "same clade: HLI"

# Publication connectivity
publication to expression source association:
  is_a: Association
  represented_as: edge
  label_as_edge: published_expression_data_about
  label_in_input: published_expression_data_about
  source: publication
  target: [environmental condition, organism taxon]

cyanorak_cluster:
  is_a: GroupingClass
  represented_as: node
  preferred_id: id
  label_in_input: cyanorak_cluster
  properties:
    cluster_number: str

gene_in_cyanorak_cluster:
  is_a: Association
  represented_as: edge
  label_as_edge: gene_in_cyanorak_cluster
  source: gene
  target: cyanorak_cluster
  label_in_input: gene_in_cyanorak_cluster

timeseries_cluster:
  is_a: GroupingClass
  represented_as: node
  preferred_id: id
  label_in_input: timeseries_cluster
  properties:
    name: str
    method: str # e.g., WGCNA, k-means
    description: str

cluster_in_publication:
  is_a: Association
  represented_as: edge
  label_as_edge: cluster_in_publication
  source: timeseries_cluster
  target: publication
  label_in_input: cluster_in_publication

molecular_in_cluster:
  is_a: Association
  represented_as: edge
  source: [gene, protein]
  target: timeseries_cluster
  label_in_input: member_of_cluster
  




