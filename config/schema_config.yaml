# ---
# "Named Things"
# ---
   
gene:
  represented_as: node
  preferred_id: ncbigene
  label_in_input: gene
  properties:
    locus_tag: str
    locus_tag_ncbi: str
    locus_tag_cyanorak: str
    start: int
    end: int
    start_cyanorak: int
    end_cyanorak: int
    strand: str
    strand_cyanorak: str
    product: str
    product_cyanorak: str
    protein_id: str
    cyanorak_Role: str[]
    cyanorak_Role_description: str[]
    tIGR_Role: str[]
    tIGR_Role_description: str[]
    cluster_number: str
    ec_numbers: str[]
    # Denormalized from linked Protein node during post-import (set via Cypher, not adapter):
    function_description: str      # UniProt functional description; present for all organisms
    # Gene naming (canonical + provenance)
    gene_name: str                    # canonical name (dnaN, rpoA, etc.)
    gene_synonyms: str[]              # all alternative names from all sources (mixed)
    gene_name_synonyms: str[]         # gene-name-like tokens only (dnaN, purF, etc.)
    alternative_locus_tags: str[]     # locus-tag-like tokens only (PMM0001, ALTBGP6_RS00025)
    gene_name_source: str             # cyanorak|uniprot|ncbi|eggnog
    product_source: str               # provenance for product field
    function_description_source: str  # provenance for function_description
    alternate_functional_descriptions: str[]  # all-source descriptions for LLM use: "[source] text"
    old_locus_tags: str[]             # old-style locus tags (for paper ID mapping)
    # EggNOG / COG functional roles
    cog_category: str[]               # COG letter codes, one per element (e.g., ["L", "U"])
    eggnog_ogs: str[]                 # eggNOG OG IDs (COG####, bactNOG####, etc.)
    eggnog_og_descriptions: str[]     # OG descriptions
    seed_ortholog: str                # seed ortholog ID
    max_annot_lvl: str                # max annotation level (e.g., "1117|Cyanobacteria")
    seed_ortholog_evalue: float       # e-value for seed ortholog
    alteromonadaceae_og: str          # Alteromonadaceae-level OG ID (e.g., "4648R@72275|Alteromonadaceae"); Alteromonas only
    bacteria_cog_og: str              # Bacteria-level COG ID (e.g., "COG0592") for cross-phylum ortholog matching
    protein_family: str               # protein family name
    # Gene Ontology (unified from all sources)
    go_terms: str[]                   # GO:XXXXXXX all aspects unified
    go_term_descriptions: str[]       # GO term descriptions (list)
    # KEGG (expanded)
    kegg_ko: str[]                    # KO IDs (e.g., K02338)
    kegg_ko_descriptions: str[]
    kegg_pathway: str[]               # KEGG pathway IDs
    kegg_module: str[]
    kegg_reaction: str[]
    kegg_brite: str[]
    # Pfam domains
    pfam_ids: str[]
    pfam_names: str[]
    pfam_descriptions: str[]
    # Specialized function
    catalytic_activities: str[]
    transmembrane_regions: str[]
    signal_peptide: str
    transporter_classification: str[]
    cazy_ids: str[]
    bigg_reaction: str[]
    # Computed fields for MCP gene lookup
    organism_strain: str              # preferred organism name (e.g., "Prochlorococcus MED4")
    gene_summary: str                 # "gene_name :: product :: description"
    all_identifiers: str[]            # union of all alt IDs for single-array get_gene lookup
    # Quality
    annotation_quality: int           # 0=none,1=eggnog-only,2=NCBI/Cyanorak,3=UniProt

# consider adding: Note, exceptions, inference




protein:
  represented_as: node
  preferred_id: uniprot
  label_in_input: protein
  properties:
    sequence_length: int
    molecular_mass: int
    protein_synonyms: str        # full protein name string from UniProt
    proteome_ids: str[]
    gene_names: str[]
    gene_symbol: str
    ec_numbers: str[]
    subcellular_location: str
    locus_tag: str
    catalytic_activities: str[]
    cofactor_names: str[]
    function_description: str
    pathways: str[]
    annotation_score: float
    caution_notes: str
    keyword_ids: str[]
    keywords: str[]
    is_reviewed: bool
    interaction_notes: str
    go_cellular_components: str[]
    go_biological_processes: str[]
    go_molecular_functions: str[]
    transmembrane_regions: str[]
    signal_peptide: str
    domain_description: str
    functional_motifs: str
    protein_family: str
    refseq_ids: str[]
    string_ids: str
    eggnog_ids: str
    pfam_ids: str[]

  
organism taxon:
  represented_as: node
  preferred_id: insdc.gcf
  label_in_input: organism
  properties:
    organism_name: str
    preferred_name: str  # human-readable name, e.g. "Prochlorococcus MED4", "Alteromonas macleodii HOT1A3"
    strain_name: str
    ncbi_taxon_id: int
    clade: str           # research clade, e.g. HLI, HLII, LLIV (Prochlorococcus-specific)
    lineage: str         # full NCBI lineage string
    superkingdom: str    # e.g. Bacteria
    kingdom: str         # e.g. Bacillati
    phylum: str          # e.g. Cyanobacteriota
    tax_class: str       # e.g. Cyanophyceae
    order: str           # e.g. Synechococcales
    family: str          # e.g. Prochlorococcaceae
    genus: str           # e.g. Prochlorococcus
    species: str         # e.g. Prochlorococcus marinus

environmental condition:
  is_a: EnvironmentalFeature
  represented_as: node
  preferred_id: id
  label_in_input: environmental_condition
  properties:
    name: str
    condition_type: str  # "gas_shock" | "nutrient_stress" | "light_stress"
    condition_category: str  # same value as condition_type; canonical vocabulary for querying

    # Growth conditions
    medium: str            # e.g., "Pro99", "PRO99-lowN", "PEv medium"
    temperature: str       # e.g., "24C", "21C"

    # Gas parameters
    oxygen_level: str      # e.g., "0%", "21%", "depleted"
    co2_level: str         # e.g., "0%", "ambient"

    # Nutrient parameters
    nitrogen_source: str   # e.g., "ammonia", "nitrate", "none"
    nitrogen_level: str    # e.g., "replete", "limited", "starved"
    phosphate_level: str   # e.g., "replete", "limited", "starved"

    # Light parameters
    light_condition: str   # e.g., "darkness", "blue", "red", "white"
    light_intensity: str   # e.g., "0", "low", "high"

    description: str
    publications: str[]

protein domain:  
  represented_as: node
  preferred_id: interpro
  label_in_input: domain
  properties:    
    protein_count: int
    name: str
    type: str
    parent_list: str[]
    child_list: str[]
    pfam: str[]
    ec: str[]
    pdb: str[]
    
biological process:
  is_a: gene ontology
  represented_as: node
  preferred_id: go
  label_in_input: biological process
  properties:
    name: str
    anc2vec_embedding: float[]
  
cellular component:
  represented_as: node
  preferred_id: go
  label_in_input: cellular component
  properties:
    name: str
    anc2vec_embedding: float[]

molecular function:
  synonym_for: molecular activity
  represented_as: node
  preferred_id: go
  label_in_input: molecular function
  properties:
    name: str
    anc2vec_embedding: float[]
  

compound:
  is_a: SmallMolecule
  represented_as: node
  preferred_id: id
  label_in_input: compound
  properties:
    smiles: str
    type: str
