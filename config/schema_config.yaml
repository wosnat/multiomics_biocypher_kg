#Title: BioCypher graph schema configuration file for multi-omics studies
#Version: 1.0
#Author: Osnat Weissberg
#Date: 2024-06-10
#########################################
# Publication and Expression Edges
#########################################

publication:
  is_a: Publication
  represented_as: node
  preferred_id: doi
  label_in_input: publication
  properties:
    title: str
    authors: str[]
    journal: str
    publication_year: int
    doi: str
    pmid: str
    description: str
    abstract: str
    study_type: str # e.g., Transcriptomics, Proteomics
    organisms: str[]                   # post-import: computed from experiment organism_name + coculture_partner
    experiment_count: int              # post-import: count of Has_experiment edges
    treatment_types: str[]             # post-import: distinct treatment_type from experiments
    background_factors: str[]          # post-import: distinct background_factors from experiments
    omics_types: str[]                 # post-import: distinct omics_type from experiments
    growth_phases: str[]               # post-import: distinct growth_phases from experiments
    derived_metric_count: int        # post-import (Plan 3)
    derived_metric_gene_count: int   # post-import (Plan 3): distinct genes via child DMs
    compartments: str[]              # post-import (Plan 3): distinct compartment from child Experiments
    derived_metric_types: str[]      # post-import (Plan 3): distinct metric_type from child DMs
    derived_metric_value_kinds: str[]  # post-import (Plan 3)
    derived_metric_search_text: str  # post-import: aggregated DM tokens (name + metric_type tokenized + field_description) for publicationFullText; null when no DMs reachable


# Experiment node: groups time-series analyses for a single scientific comparison
experiment:
  is_a: InvestigativeProcess
  represented_as: node
  preferred_id: id
  label_in_input: experiment
  properties:
    name: str
    organism_name: str
    treatment_type: str[]
    background_factors: str[]
    treatment: str
    control: str
    experimental_context: str
    coculture_partner: str
    omics_type: str
    statistical_test: str
    is_time_course: str
    medium: str
    temperature: str
    light_condition: str
    light_intensity: str
    compartment: str                 # adapter-emitted; default "whole_cell"; vocab in multiomics_kg/vocab/non_de_evidence.py
    table_scope: str
    table_scope_detail: str
    gene_count: int                  # post-import: cumulative count of Changes_expression_of edges (sums across timepoints for time-course experiments)
    distinct_gene_count: int         # post-import: distinct gene count (union across timepoints); distinct_gene_count <= gene_count, equality only for non-time-course or single-TP experiments
    significant_up_count: int
    significant_down_count: int
    time_point_count: int
    time_point_labels: str[]
    time_point_orders: int[]
    time_point_hours: float[]
    time_point_totals: int[]
    time_point_significant_up: int[]
    time_point_significant_down: int[]
    time_point_growth_phases: str[]  # post-import: per-timepoint growth_phase (parallel array; "" = unknown)
    growth_phases: str[]          # post-import: distinct growth_phase values from edges
    reports_fold_change: str         # post-import (Plan 3): "true" | "false"
    reports_derived_metric_types: str[]  # post-import (Plan 3): distinct metric_type from child DMs
    derived_metric_count: int        # post-import (Plan 3): count of child DerivedMetric nodes
    derived_metric_value_kinds: str[]  # post-import (Plan 3): distinct value_kind from child DMs
    derived_metric_gene_count: int   # post-import (Plan 3): distinct genes reached via any child DM edge
    derived_metric_search_text: str  # post-import: aggregated DM tokens (name + metric_type tokenized + field_description) for experimentFullText; null when no DMs reachable

# GeneCluster node: groups co-expressed genes from a clustering analysis within a publication
gene cluster:
  is_a: GroupingClass
  represented_as: node
  preferred_id: cluster_id
  label_in_input: gene_cluster
  properties:
    id: str
    name: str
    organism_name: str
    member_count: int
    functional_description: str
    temporal_pattern: str
    expression_dynamics: str

# ClusteringAnalysis node: represents a clustering analysis from a publication
clustering analysis:
  is_a: information content entity
  represented_as: node
  preferred_id: clustering_analysis_id
  label_in_input: clustering_analysis
  properties:
    name: str
    organism_name: str
    cluster_method: str
    cluster_count: int
    total_gene_count: int
    omics_type: str
    treatment_type: str[]
    background_factors: str[]
    treatment: str
    light_condition: str
    cluster_type: str
    experimental_context: str
    growth_phases: str[]   # post-import: distinct growth_phases from linked experiments

# DerivedMetric node: one per (Experiment × metric_type). Carries column-level
# metric semantics. Edge type emitted to Gene depends on value_kind.
# Adapter emits in Plan 2; post-import computes total_gene_count + growth_phases in Plan 3.
derived metric:
  is_a: information content entity
  represented_as: node
  preferred_id: derived_metric_id
  label_in_input: derived_metric
  properties:
    name: str
    experiment_id: str
    organism_name: str
    publication_doi: str
    compartment: str
    omics_type: str
    treatment_type: str[]
    background_factors: str[]
    treatment: str
    light_condition: str
    experimental_context: str
    metric_type: str
    value_kind: str                  # "numeric" | "boolean" | "categorical"
    unit: str
    rankable: str                    # "true" | "false" (string enum)
    has_p_value: str                 # "true" | "false" (string enum)
    p_value_threshold: float
    allowed_categories: str[]
    field_description: str
    total_gene_count: int            # post-import (Plan 3)
    growth_phases: str[]             # post-import (Plan 3)
    # Numeric DM distribution stats (post-import; null for boolean/categorical)
    value_min: float
    value_max: float
    value_q1: float
    value_median: float
    value_q3: float
    # Boolean DM flag counts (post-import; null for numeric/categorical)
    flag_true_count: int
    flag_false_count: int
    # Categorical DM category distribution (post-import; null for numeric/boolean)
    # Parallel arrays sorted by label for deterministic output.
    category_labels: str[]
    category_counts: int[]

# Publication → Experiment
publication has experiment:
  is_a: Association
  represented_as: edge
  label_as_edge: has_experiment
  label_in_input: has_experiment
  source: publication
  target: experiment

# Experiment → OrganismTaxon (coculture experiments only)
experiment tests coculture:
  is_a: Association
  represented_as: edge
  label_as_edge: tests_coculture_with
  label_in_input: tests_coculture_with
  source: experiment
  target: organism taxon

# Publication → ClusteringAnalysis
publication has clustering analysis:
  is_a: related to at instance level
  represented_as: edge
  label_in_input: publication_has_clustering_analysis
  source: publication
  target: clustering analysis

# ClusteringAnalysis → GeneCluster
clustering analysis has gene cluster:
  is_a: related to at instance level
  represented_as: edge
  label_in_input: clustering_analysis_has_gene_cluster
  source: clustering analysis
  target: gene cluster

# ClusteringAnalysis → OrganismTaxon
clusteringanalysis belongs to organism:
  is_a: related to at instance level
  represented_as: edge
  label_in_input: clusteringanalysis_belongs_to_organism
  source: clustering analysis
  target: organism taxon

# Experiment → ClusteringAnalysis
experiment has clustering analysis:
  is_a: related to at instance level
  represented_as: edge
  label_in_input: experiment_has_clustering_analysis
  source: experiment
  target: clustering analysis

# Publication → DerivedMetric (mirrors Publication_has_clustering_analysis)
publication has derived metric:
  is_a: related to at instance level
  represented_as: edge
  label_in_input: publication_has_derived_metric
  source: publication
  target: derived metric

# Experiment → DerivedMetric (mirrors Experiment_has_clustering_analysis)
experiment has derived metric:
  is_a: related to at instance level
  represented_as: edge
  label_in_input: experiment_has_derived_metric
  source: experiment
  target: derived metric

# DerivedMetric → OrganismTaxon (mirrors Clusteringanalysis_belongs_to_organism)
derived metric belongs to organism:
  is_a: related to at instance level
  represented_as: edge
  label_in_input: derived_metric_belongs_to_organism
  source: derived metric
  target: organism taxon

# DerivedMetric → Gene (numeric metric_type; value_kind="numeric")
derived metric quantifies gene:
  is_a: Association
  represented_as: edge
  label_as_edge: derived_metric_quantifies_gene
  label_in_input: derived_metric_quantifies_gene
  source: derived metric
  target: gene
  properties:
    metric_type: str
    value: float
    p_value: float
    adjusted_p_value: float
    rank_by_metric: int              # post-import (Plan 3; rankable="true" only)
    metric_percentile: float         # post-import (Plan 3; rankable="true" only)
    metric_bucket: str               # post-import (Plan 3; rankable="true" only)
    significant: str                 # post-import (Plan 3; has_p_value="true" only)

# DerivedMetric → Gene (boolean metric_type; value_kind="boolean")
derived metric flags gene:
  is_a: Association
  represented_as: edge
  label_as_edge: derived_metric_flags_gene
  label_in_input: derived_metric_flags_gene
  source: derived metric
  target: gene
  properties:
    metric_type: str
    value: str                       # "true" | "false" (string enum)

# DerivedMetric → Gene (categorical metric_type; value_kind="categorical")
derived metric classifies gene:
  is_a: Association
  represented_as: edge
  label_as_edge: derived_metric_classifies_gene
  label_in_input: derived_metric_classifies_gene
  source: derived metric
  target: gene
  properties:
    metric_type: str
    value: str                       # must be in parent DerivedMetric.allowed_categories

# GeneCluster → Gene membership edges
gene in gene cluster:
  is_a: Association
  represented_as: edge
  label_as_edge: gene_in_gene_cluster
  label_in_input: gene_in_gene_cluster
  source: gene cluster
  target: gene
  properties:
    membership_score: float
    p_value: float

# Experiment → Gene expression edges (unified: replaces condition_ and coculture_ variants)
experiment to gene expression association:
  is_a: Association
  represented_as: edge
  label_as_edge: changes_expression_of
  label_in_input: changes_expression_of
  source: experiment
  target: gene
  properties:
    time_point: str
    time_point_order: int
    time_point_hours: float
    growth_phase: str
    log2_fold_change: float
    adjusted_p_value: float
    expression_direction: str
    significant: str
    expression_status: str    # post-import: "significant_up", "significant_down", or "not_significant"
    rank_by_effect: int       # post-import: rank by |log2FC| among all genes per experiment x timepoint (1 = strongest)
    rank_up: int              # post-import: rank by |log2FC| among significant_up genes per experiment x timepoint; null if not significant_up
    rank_down: int            # post-import: rank by |log2FC| among significant_down genes per experiment x timepoint; null if not significant_down

ortholog group:
  is_a: GroupingClass
  represented_as: node
  preferred_id: id
  label_in_input: ortholog_group
  properties:
    name: str              # raw OG identifier (e.g., "CK_00000364", "COG0592@2", "1MKTR@1212")
    source: str            # "cyanorak" | "eggnog"
    taxonomic_level: str   # "curated" | "Prochloraceae" | "Alteromonadaceae" | "Bacteria" | etc.
    taxon_id: int          # NCBI taxon ID of the level (0 for curated)
    specificity_rank: int  # 0=curated, 1=family, 2=order, 3=domain (Bacteria)
    consensus_product: str
    consensus_gene_name: str
    description: str
    functional_description: str
    member_count: int
    organism_count: int
    genera: str[]
    has_cross_genus_members: str  # "cross_genus" | "single_genus"

gene in ortholog group:
  is_a: Association
  represented_as: edge
  label_as_edge: gene_in_ortholog_group
  source: gene
  target: ortholog group
  label_in_input: gene_in_ortholog_group

  




