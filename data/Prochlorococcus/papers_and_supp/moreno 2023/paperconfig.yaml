    light_low_glucose_med4_proteomics:
      name: "MED4 proteomics: light +100 nM glucose vs light (control)"
      organism: "Prochlorococcus MED4"
      treatment_condition: "Light + 100 nM glucose addition"
      control_condition: "Light (no glucose)"
      experimental_context: "Non-axenic Prochlorococcus MED4 in Pro99 medium, 24C, continuous light; 100 nM glucose added at start of experiment; harvested at stationary growth; n=3 per condition. Proteomics LC-MS/MS."
      omics_type: PROTEOMICS
      test_type: "t-test"
      treatment_type: ["carbon"]
      background_factors: ["coculture", "light"]
      medium: "Pro99"
      temperature: "24C"
      light_condition: "continuous light"
      light_intensity: "15 umol photons m-2 s-1"
      table_scope: all_detected_genes
