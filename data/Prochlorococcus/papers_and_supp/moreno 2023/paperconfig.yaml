# ═══════════════════════════════════════════════════════════════════════════
# DEFERRED: Alteromonas S3 tables (5 CSVs, 20 comparisons)
# ---------------------------------------------------------------------------
# The paper's supplementary table S3 contains Alteromonas proteomics from the
# heterotroph fraction of 5 cyano cocultures (BL107, MED4, SS120, WH7803,
# WH8102). The source CSVs (`table s3 Alteromonas in <strain> cultures
# spectrum.03275-22-s0003.csv`) use the MarRef v6 custom locus prefix
# `DEH24_*`, while the KG's Alteromonas mediterranea DE reference assembly
# (GCF_000020585.3) uses `MADE_RS#####`. An id_translation bridge
# (DEH24 → MADE_RS) is needed before these CSVs can be loaded — same pattern
# as the EZ55 and MIT1002 deployments.
#
# The 5 S3 Alteromonas experiments and their 20 statistical_analyses entries
# are included below as EXPLICIT PLACEHOLDERS (commented out and tagged with
# `TODO(deferred): DEH24 → MADE_RS bridge needed`) so that this deferred
# work is visible to greps rather than silently absent. When the bridge is
# built, uncomment the supp_table_s3_* blocks and replace placeholder values.
#
# See: docs/superpowers/specs/2026-04-14-csv-ready-papers-batch-design.md
#      ("Open Items" section and the light_low_glucose / light_high_glucose /
#      dark_low_glucose / dark_high_glucose naming convention).
# ═══════════════════════════════════════════════════════════════════════════
publication:
  papername: "Moreno 2023"
  # Moreno-Cabezuelo et al. 2023, Microbiology Spectrum, DOI 10.1128/spectrum.03275-22
  # Integrated proteomic and metabolomic analyses show differential effects of
  # glucose (100 nM or 5 mM) in the light vs darkness on Prochlorococcus
  # (MED4, SS120) and Synechococcus (WH7803, WH8102, BL107) strains in
  # non-axenic cultures. Heterotroph fractions (Alteromonas, Marinobacter)
  # were also proteomically profiled.
  #
  # Cultures were grown in Pro99 (Prochlorococcus) or SN (Synechococcus) media
  # at 24C; n=3 biological replicates per condition; proteomes acquired with
  # LC-MS/MS and matched against the MarRef v6 reference DB.
  #
  # Experiment count: 5 cyano × 4 glucose x light comparisons (=20) +
  # 5 Marinobacter cocultures × 4 comparisons (=20) - 1 missing column for
  # SS120 Marinobacter FC G mM/L = 39 active experiments total, plus 5
  # Alteromonas placeholder experiments (not yet loaded — see top comment).
  papermainpdf: "data/Prochlorococcus/papers_and_supp/moreno 2023/moreno-cabezuelo-et-al-2023-integrated-proteomic-and-metabolomic-analyses-show-differential-effects-of-glucose.pdf"

  experiments:
    # ─────────────────────────────────────────────────────────────────────
    # Cyano S2 — 5 strains × 4 comparisons
    # Primary organism = cyano. No treatment_organism because cyano side is
    # a non-axenic community, not a defined coculture partner.
    # ─────────────────────────────────────────────────────────────────────

