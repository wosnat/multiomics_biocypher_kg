publication:
  papername: Martiny 2006
  papermainpdf: data/Prochlorococcus/papers_and_supp/martiny 2006/martiny-et-al-2006-phosphate-acquisition-genes-in-prochlorococcus-ecotypes-evidence-for-genome-wide-adaptation.pdf
  experiments:
    phosphorus_stress_phosphate_starvation_med4_microarray:
      name: MED4 Phosphate starvation vs P-replete Pro99 medium (MICROARRAY)
      organism: Prochlorococcus MED4
      treatment_condition: Phosphate starvation
      control_condition: P-replete Pro99 medium
      experimental_context: MED4 grown at 22C in continuous light at 30 uE m-2 s-1 in Pro99 medium
      omics_type: MICROARRAY
      test_type: microarray_Cyber-T
      treatment_type: phosphorus_stress
      medium: Pro99 with no added PO4
      temperature: 22C
      light_condition: continuous light
      light_intensity: 30 uE m-2 s-1 (MED4), 12 uE m-2 s-1 (MIT9313)
      table_scope: filtered_subset
      table_scope_detail: Genes with q < 0.05 at t=48h, all timepoints reported
    phosphorus_stress_phosphate_starvation_mit9313_microarray:
      name: MIT9313 Phosphate starvation vs P-replete Pro99 medium (MICROARRAY)
      organism: Prochlorococcus MIT9313
      treatment_condition: Phosphate starvation
      control_condition: P-replete Pro99 medium
      experimental_context: MIT9313 grown at 22C in continuous light at 12 uE m-2 s-1 in Pro99 medium
      omics_type: MICROARRAY
      test_type: microarray_Cyber-T
      treatment_type: phosphorus_stress
      medium: Pro99 with no added PO4
      temperature: 22C
      light_condition: continuous light
      light_intensity: 30 uE m-2 s-1 (MED4), 12 uE m-2 s-1 (MIT9313)
      table_scope: filtered_subset
      table_scope_detail: Genes with q < 0.05 at t=48h, all timepoints reported
