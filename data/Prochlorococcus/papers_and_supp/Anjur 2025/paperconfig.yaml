publication:
  papername: Anjur-Dietrich 2025
  papermainpdf: data/Prochlorococcus/papers_and_supp/Anjur 2025/2025.08.05.668435v1.full.pdf
  experiments:
    growth_state_freeliving_planktonic_enrichment_mit9301_rnaseq:
      name: MIT9301 Free-living (planktonic) enrichment vs Biofilm (adherent) enrichment (RNASEQ)
      organism: Prochlorococcus MIT9301
      treatment_condition: Free-living (planktonic) enrichment
      control_condition: Biofilm (adherent) enrichment
      experimental_context: Axenic MIT9301 planktonic and biofilm enrichment populations (each serially selected for >100
        generations) grown undisturbed to mid-exponential phase in Pro99-ESL at 24C under continuous light (45 umol photons
        m-2 s-1). RNA extracted from triplicate biological replicates. Differential expression with log2FC threshold 0.8 and
        q-value threshold 0.05.
      omics_type: RNASEQ
      test_type: edgeR
      treatment_type: [growth_phase]
      background_factors: [axenic, light]
      medium: Pro99-ESL (0.2 um filtered, autoclaved sterile seawater amended with Pro99 nutrients)
      temperature: 24C
      light_condition: continuous light
      light_intensity: 45 umol photons m-2 s-1
      table_scope: significant_only
      table_scope_detail: FDR < 0.05 and |logFC| > 0.8
  supplementary_materials:
    annotation_genome_9301:
      type: id_translation
      filename: data/Prochlorococcus/papers_and_supp/Anjur 2025/9301_annotated_genome.csv
      organism: Prochlorococcus MIT9301
      id_columns:
      - column: uniprot_gene_name
        id_type: old_locus_tag
      - column: uniprot_entry_name
        id_type: uniprot_entry_name
      - column: ID
        id_type: jgi_id
      - column: em_Preferred_name
        id_type: gene_name
      product_columns:
      - column: product
      - column: uniprot_protein_name
    annotation_gff_mit9301:
      type: annotation_gff
      filename: data/Prochlorococcus/papers_and_supp/Anjur 2025/GCF_000015965.1_ASM1596v1_genomic.gff
      organism: Prochlorococcus MIT9301
    supp_table_1:
      type: csv
      filename: data/Prochlorococcus/papers_and_supp/Anjur 2025/de_genes_freeliving_vs_biofilms.csv
      organism: Prochlorococcus MIT9301
      id_columns:
      - column: ID
        id_type: jgi_id
