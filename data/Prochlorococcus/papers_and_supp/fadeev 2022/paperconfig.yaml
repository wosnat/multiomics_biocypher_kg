    s1_ad45:
      type: derived_metrics_table
      filename: data/Prochlorococcus/papers_and_supp/fadeev 2022/Table_S1-most_abundant_MV_proteins_Supplementary_Data - AD45_modified.csv
      organism: Alteromonas macleodii AD45
      experiment: vesicle_proteomics_ad45
      name_col: NCBI_PGAP_accession
      id_columns:
        - column: NCBI_PGAP_accession
          id_type: protein_id_refseq
      product_columns:
        - column: NCBI_PGAP_function
      metrics:
        - metric_type: prop_abund_mvs_percent
          name: "AD45 protein proportional abundance in vesicle fraction (Fadeev 2022 Table S1)"
          value_kind: numeric
          value_col: prop_abund_mvs_percent
          unit: "percent of summed PSM intensity in vesicle fraction"
          rankable: "true"
          has_p_value: "false"
          field_description: "Per-protein NSAF-style proportional abundance (% of summed spectral counts) in the purified MV fraction; Fadeev 2022 Table S1"
        - metric_type: prop_abund_cells_percent
          name: "AD45 protein proportional abundance in whole-cell fraction (Fadeev 2022 Table S1)"
          value_kind: numeric
          value_col: prop_abund_cells_percent
