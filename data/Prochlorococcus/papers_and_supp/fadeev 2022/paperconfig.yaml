        - metric_type: log2_mv_cell_enrichment
          name: "AD45 log2(MV / cell) abundance enrichment (Fadeev 2022 Table S1, derived)"
          value_kind: numeric
          value_col: log2_mv_cell_enrichment
          unit: "log2 ratio"
          rankable: "true"
          has_p_value: "false"
          field_description: "log2 ratio of vesicle-fraction over cell-fraction proportional abundance; computed by build_fadeev2022_modified_csv.py for proteins detected in both fractions; Fadeev 2022 Table S1"
