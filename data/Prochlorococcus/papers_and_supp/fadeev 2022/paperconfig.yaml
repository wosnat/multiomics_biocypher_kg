# Fadeev 2022 — Alteromonas macleodii membrane vesicle (MV) vs whole-cell proteomics.
# Six strains compared in a single growth condition each (axenic, AMP1 + organic carbons, 20C, dark).
# No DE comparison — Table S1 reports NSAF-style proportional-abundance % per fraction (vesicle, cell).
# Wired as `derived_metrics_table` (numeric) per strain; pattern mirrors Biller 2022 vesicle entries.
# CSVs are pre-processed by scripts/build_modified_csv/build_fadeev2022_modified_csv.py to:
#   - strip percent signs (observations_adapter calls float() and would skip "13.3%")
#   - add a derived `log2_mv_cell_enrichment` column (log2(MVs/Cells) where both > 0).
publication:
  papername: Fadeev 2022
  doi: "10.1093/femsml/uqac025"
  papermainpdf: data/Prochlorococcus/papers_and_supp/fadeev 2022/uqac025.pdf
  experiments:
    vesicle_proteomics_ad45:
      name: AD45 vesicle vs whole-cell proteome (label-free LC-MS/MS)
      organism: Alteromonas macleodii AD45
      compartment: vesicle
      treatment_condition: Vesicle fraction (extracellular)
      control_condition: Whole cell (intracellular)
      experimental_context: Axenic culture in AMP1 + organic carbons at 20C in the dark; MVs purified by 0.22 um filtration + tangential flow filtration (100 kDa cutoff) + ultracentrifugation; peptides identified by SEQUEST-HT in Proteome Discoverer v3.0 against the strain's NCBI_PGAP genome; reported as NSAF-style proportional-abundance percentages per fraction
      omics_type: VESICLE_PROTEOMICS
      test_type: LC-MS/MS
      treatment_type: [compartment]
      background_factors: [axenic, darkness]
      medium: AMP1 artificial seawater amended with 0.05% w/v lactate, pyruvate, acetate, glycerol and a vitamin mix
      temperature: 20C
      light_condition: dark
      light_intensity: "0 umol photons m-2 s-1"
      table_scope: top_n
      table_scope_detail: "Top-N most-abundant MV proteins per strain; complementary cell-fraction percentages provided where the protein was also detected in the whole-cell fraction"
