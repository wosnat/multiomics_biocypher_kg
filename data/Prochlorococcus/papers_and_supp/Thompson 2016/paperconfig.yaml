publication:
  papername: Thompson 2016
  papermainpdf: data/Prochlorococcus/papers_and_supp/Thompson 2016/thompson 2016 file.pdf
  experiments:
    light_stress_constant_dark_med4_rnaseq_infected:
      name: MED4 Constant dark vs Constant light (90 µE m-2 s-1) (RNASEQ)
      organism: Prochlorococcus MED4
      treatment_condition: Constant dark
      control_condition: Constant light (90 µE m-2 s-1)
      experimental_context: Prochlorococcus MED4 infected with cyanophage P-HM2 (MOI=1) in Pro99 natural seawater medium at
        19-22C; dark vs light treatment; prefiltered to significant DEGs
      omics_type: RNASEQ
      test_type: DESeq2
      treatment_type: light_stress
      medium: Pro99 natural seawater medium
      temperature: 19-22C
      light_condition: constant darkness
      light_intensity: '0'
    light_stress_constant_dark_med4_rnaseq_dark:
      name: MED4 Constant dark vs Constant light (90 µE m-2 s-1) (RNASEQ)
      organism: Prochlorococcus MED4
      treatment_condition: Constant dark
      control_condition: Constant light (90 µE m-2 s-1)
      experimental_context: Prochlorococcus MED4 inoculated with spent medium (no phage) in Pro99 natural seawater medium
        at 19-22C; dark vs light treatment; prefiltered to significant DEGs
      omics_type: RNASEQ
      test_type: DESeq2
      treatment_type: light_stress
      medium: Pro99 natural seawater medium
      temperature: 19-22C
      light_condition: constant darkness
      light_intensity: '0'
    viral_phage_phm2_lysate_med4_rnaseq_light:
      name: MED4 Phage (P-HM2) lysate vs Spent medium (uninfected) in light (RNASEQ)
      organism: Prochlorococcus MED4
      treatment_condition: Phage (P-HM2) lysate
      control_condition: Spent medium (uninfected)
      experimental_context: Prochlorococcus MED4 under constant light (90 µE m-2 s-1) in Pro99 natural seawater medium at
        19-22C; infected with cyanophage P-HM2 (MOI=1) vs uninfected spent medium control; prefiltered to significant DEGs
      omics_type: RNASEQ
      test_type: DESeq2
      treatment_type: viral
      medium: Pro99 natural seawater medium
      temperature: 19-22C
      light_condition: continuous light
      light_intensity: 90 uE m-2 s-1
      treatment_organism: Phage
      treatment_taxid: 10239
    viral_phage_phm2_lysate_med4_rnaseq_dark:
      name: MED4 Phage (P-HM2) lysate vs Spent medium (uninfected) in dark (RNASEQ)
      organism: Prochlorococcus MED4
      treatment_condition: Phage (P-HM2) lysate
      control_condition: Spent medium (uninfected)
      experimental_context: Prochlorococcus MED4 in complete darkness in Pro99 natural seawater medium at 19-22C; infected
        with cyanophage P-HM2 (MOI=1) vs uninfected spent medium control; prefiltered to significant DEGs
      omics_type: RNASEQ
      test_type: DESeq2
      treatment_type: viral
      medium: Pro99 natural seawater medium
      temperature: 19-22C
      light_condition: constant darkness
      light_intensity: '0'
      treatment_organism: Phage
      treatment_taxid: 10239
  supplementary_materials:
    dark_vs_light_infected_0.5h:
      type: csv
      filename: data/Prochlorococcus/papers_and_supp/Thompson 2016/DE_genes_dark_vs_light_infected_phage_0.5h.csv
      statistical_analyses:
      - id: DE_dark_vs_light_infected_MED4_0.5h
        experiment: light_stress_constant_dark_med4_rnaseq_infected
        timepoint: 0.5h post-inoculation
        timepoint_hours: 0.5
        name_col: locus_tag
        logfc_col: log2_fold_change
        pvalue_threshold: 0.2
        logfc_threshold: 1.5
        prefiltered: true
