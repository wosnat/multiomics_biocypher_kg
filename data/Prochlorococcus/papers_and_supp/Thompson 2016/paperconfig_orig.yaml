publication:
  papername: "Thompson 2016"
  papermainpdf: "data/Prochlorococcus/papers_and_supp/Thompson 2016/thompson 2016 file.pdf"

  environmental_conditions:
    thompson_2016_constant_light:
      condition_type: growth_medium
      name: "Constant light (90 µE m-2 s-1)"
      medium: "Pro99 natural seawater medium"
      temperature: "19-22C"
      light_condition: "constant_light"
      light_intensity: "90 uE m-2 s-1"
      description: "Prochlorococcus MED4 grown in constant light at 90 µE m-2 s-1 in Pro99 natural seawater medium at 19-22C"
    thompson_2016_constant_dark:
      condition_type: light_stress
      name: "Constant dark"
      medium: "Pro99 natural seawater medium"
      temperature: "19-22C"
      light_condition: "constant_darkness"
      light_intensity: "0"
      description: "Prochlorococcus MED4 maintained in complete darkness from splitting of the mother culture onward; dim light used only for sampling operations"

  supplementary_materials:

    # --- Dark vs Light in PHAGE-INFECTED cells ---
    dark_vs_light_infected_0.5h:
      type: csv
      filename: "data/Prochlorococcus/papers_and_supp/Thompson 2016/DE_genes_dark_vs_light_infected_phage_0.5h.csv"
      statistical_analyses:
        - type: RNASEQ
          name: "DE of Prochlorococcus MED4 dark vs light in phage-infected cells at 0.5h post-inoculation"
          id: DE_dark_vs_light_infected_MED4_0.5h
          test_type: "DESeq2"
          control_condition: "Light"
          treatment_condition: "Dark"
          environmental_control_condition_id: thompson_2016_constant_light
          environmental_treatment_condition_id: thompson_2016_constant_dark
          experimental_context: "Prochlorococcus MED4 infected with cyanophage P-HM2 (MOI=1) in Pro99 natural seawater medium at 19-22C; dark vs light treatment; prefiltered to significant DEGs"
          timepoint: "0.5h post-inoculation"
          organism: "Prochlorococcus MED4"
          name_col: locus_tag
          logfc_col: log2_fold_change
          prefiltered: true
          pvalue_threshold: 0.2
          logfc_threshold: 1.5

