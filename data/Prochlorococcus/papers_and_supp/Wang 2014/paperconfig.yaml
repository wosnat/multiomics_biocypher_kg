publication:
  papername: Wang 2014
  papermainpdf: "data/Prochlorococcus/papers_and_supp/Wang 2014/1471-2180-14-11.pdf"

  experiments:
    expression_profiling_med4_rnaseq:
      name: "MED4 steady-state expression profiling across growth conditions"
      organism: "Prochlorococcus MED4"
      treatment_condition: "Multiple growth conditions (Pro99 and AMP media, exponential and log-phase)"
      control_condition: "Multi-condition profiling (Pro99/AMP, exponential/stationary)"
      experimental_context: "RNA-seq across 10 samples from MED4 grown in Pro99 and AMP media at exponential and log-phase; RPKM quartiles used to classify genes by expression level; 21C under continuous light at 28 umol quanta m-2 s-1"
      omics_type: RNASEQ
      test_type: ""
      treatment_type: ["growth_phase"]
      background_factors: ["axenic", "light"]
      medium: "Pro99 and AMP"
      temperature: "21C"
      light_condition: "continuous light"
      light_intensity: "28 umol quanta m-2 s-1"

  supplementary_materials:

    # ── Per-gene categorical scalars from steady-state RNA-seq classification ──
    # Migrated from gene_clusters → derived_metrics_table: the source columns are
    # fixed-vocabulary categorical labels assigned per gene (no membership scores,
    # no soft-clustering), which the schema models as scalar gene-level attributes
    # (DerivedMetric → Gene) rather than cluster memberships.
    med4_expression_level:
      type: derived_metrics_table
      filename: "data/Prochlorococcus/papers_and_supp/Wang 2014/GeneClassification_clean.csv"
      organism: "Prochlorococcus MED4"
      experiment: expression_profiling_med4_rnaseq
      name_col: "sysName"
      id_columns:
        - column: "sysName"
          id_type: locus_tag
        - column: "locus_tag"
          id_type: alternative_locus_tag
        - column: "name"
          id_type: gene_name
      product_columns:
        - column: "desc"
      metrics:
        - metric_type: expression_level_class
          name: "MED4 RPKM expression-level class (Wang 2014)"
          value_kind: categorical
          value_col: ExpressionLevel
          allowed_categories:
            - "VEG"
            - "HEG"
            - "MEG"
            - "LEG"
            - "NEG"
            - "--"
          field_description: >-
            Per-gene expression-level class assigned from RPKM quartiles aggregated
            across 10 RNA-seq samples (MED4 in Pro99 and AMP media, exponential and
            log-phase; 21C, continuous light at 28 umol quanta m-2 s-1). Class
            meanings reported in Wang 2014: VEG = very highly expressed (top RPKM
            quartile across conditions); HEG = highly expressed, enriched for COG
            "C" energy production and conversion, "J" translation and ribosomal
            structure, and "O" protein modification, folding and turnover (Figure
            4c) and showing significantly lower nonsynonymous substitution rate
            (Ka) than MEG or LEG (P<0.001, Figure 3a); MEG = moderately expressed,
            significantly enriched for essential genes with homologs in the
            Database of Essential Genes (DEG-hit rate, P<0.001, Figure 4b); LEG =
            lowly expressed, slightly enriched for COG "R" general function
            (P=0.023); NEG = not expressed, under-represented in the core genome
            (1.5% core vs 6.6% flexible, P<0.001, Figure 3c); -- = unclassified
            (RPKM did not fit any quartile bin).
        - metric_type: pangenome_membership
          name: "MED4 core vs flexible genome assignment (Wang 2014)"
          value_kind: categorical
          value_col: "Core/Flexible"
          allowed_categories:
            - "Core"
            - "Flexible"
          field_description: >-
            Pangenome membership for each MED4 CDS gene. Core = present across
            sequenced Prochlorococcus genomes (Prochlorococcus core gene set);
            Flexible = strain-specific or variably present across Prochlorococcus
            genomes (flexible/accessory gene set). Wang 2014 reports that the core
            genome contains significantly fewer NEG and VEG genes than the
            flexible genome (NEG: 1.5% < 6.6%; VEG: 49.6% < 64.6%; both P<0.001,
            Figure 3c), indicating that conserved core genes cluster around
            moderate expression while flexible genes are enriched at the high and
            low extremes.
