publication:
  papername: Lin 2015
  papermainpdf: data/Prochlorococcus/papers_and_supp/Lin 2015/Environmental Microbiology - 2015 - Lin - Transcriptomic response
    during phage infection of a marine cyanobacterium under.pdf
  experiments:
    phosphorus_stress_plimited_natl2a_rnaseq_uninfected:
      name: NATL2A P-limited vs P-replete control (RNASEQ)
      organism: Prochlorococcus NATL2A
      treatment_condition: P-limited
      control_condition: P-replete control
      experimental_context: Uninfected Prochlorococcus NATL2A, P-limited vs nutrient-replete
      omics_type: RNASEQ
      test_type: DESeq2
      treatment_type: phosphorus_stress
      medium: Pro99
      temperature: 24C
      light_condition: 14:10 light:dark cycle
      light_intensity: 40 umol photons m-2 s-1
    phosphorus_stress_plimited_natl2a_rnaseq_infected:
      name: NATL2A P-limited vs P-replete control (RNASEQ)
      organism: Prochlorococcus NATL2A
      treatment_condition: P-limited
      control_condition: P-replete control
      experimental_context: Phage-infected Prochlorococcus NATL2A (infected at 47h), P-limited vs nutrient-replete
