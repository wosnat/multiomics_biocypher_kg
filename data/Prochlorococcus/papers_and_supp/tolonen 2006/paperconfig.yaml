publication:
  papername: Tolonen 2006
  papermainpdf: data/Prochlorococcus/papers_and_supp/tolonen 2006/msb4100087.pdf
  experiments:
    nitrogen_nitrogen_deprivation_med4_med4_microarray:
      name: MED4 Nitrogen deprivation (MED4) vs N-replete Pro99 medium (MED4) (MICROARRAY)
      organism: Prochlorococcus MED4
      treatment_condition: Nitrogen deprivation (MED4)
      control_condition: N-replete Pro99 medium (MED4)
      experimental_context: Axenic Prochlorococcus MED4 in Pro99 at 22C under continuous light (50 umol quanta m-2 s-1)
      omics_type: MICROARRAY
      test_type: microarray_Goldenspike
      treatment_type: [nitrogen]
      background_factors: [axenic, light]
      medium: Pro99 lacking supplemented nitrogen, 1 mM HEPES pH 7.5, 6 mM sodium bicarbonate
      temperature: 22C
      light_condition: continuous light
      light_intensity: 50 umol quanta m-2 s-1
      table_scope: all_detected_genes
    growth_medium_growth_on_cyanate_as_med4_microarray:
      name: MED4 Growth on cyanate as sole N source (MED4) vs N-replete Pro99 medium (MED4) (MICROARRAY)
      organism: Prochlorococcus MED4
      treatment_condition: Growth on cyanate as sole N source (MED4)
      control_condition: N-replete Pro99 medium (MED4)
      experimental_context: Axenic Prochlorococcus MED4 in steady-state log-phase growth in Pro99 at 22C under continuous
        light (50 umol quanta m-2 s-1)
      omics_type: MICROARRAY
      test_type: microarray_Goldenspike
      treatment_type: [nitrogen]
      background_factors: [axenic, light]
      medium: Pro99 with 800 uM cyanate as sole nitrogen source
      temperature: 22C
      light_condition: continuous light
      light_intensity: 50 umol quanta m-2 s-1
      table_scope: all_detected_genes
    growth_medium_growth_on_urea_as_med4_microarray:
