  supplementary_materials:
    supp_table_med4:
      type: csv
      filename: data/Prochlorococcus/papers_and_supp/tolonen 2006/medExpression.1.csv
      id_columns:
      - column: GENE
        id_type: old_locus_tag
      product_columns:
      - column: ANNOTATION
      statistical_analyses:
      - id: DE_n_deprivation_vs_replete_MED4_0h
        experiment: nitrogen_nitrogen_deprivation_med4_med4_microarray
        timepoint: 0h
        timepoint_hours: 0.0
        name_col: GENE
        logfc_col: t=0h
        pvalue_threshold: 0.01
        pvalue_asterisk_in_logfc: true
      - id: DE_n_deprivation_vs_replete_MED4_3h
        experiment: nitrogen_nitrogen_deprivation_med4_med4_microarray
