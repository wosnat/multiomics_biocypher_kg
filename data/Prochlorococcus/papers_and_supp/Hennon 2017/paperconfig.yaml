publication:
  papername: Hennon 2017
  papermainpdf: data/Prochlorococcus/papers_and_supp/Hennon 2017/41396_2018_article_bfismej2017189.pdf
  experiments:
    carbon_stress_elevated_co2_800_ppm_mit9312_rnaseq:
      name: MIT9312 Elevated CO2 (800 ppm) vs Ambient CO2 (400 ppm) (RNASEQ)
      organism: Prochlorococcus MIT9312
      treatment_condition: Elevated CO2 (800 ppm)
      control_condition: Ambient CO2 (400 ppm)
      experimental_context: Co-culture of Prochlorococcus MIT9312 (VOL4) with Alteromonas EZ55 in PEv medium at 21C, 150 umol
        photons m-2 s-1, 14:10 light-dark cycle, acclimated ~10 generations
      omics_type: RNASEQ
      test_type: edgeR
      treatment_type: [carbon]
      background_factors: [coculture, diel]
      medium: PEv medium (artificial seawater with Pro99 nutrients at 1/25 concentration)
      temperature: 21C
      light_condition: 14:10 light-dark cycle
      light_intensity: 150 umol photons m-2 s-1
      table_scope: significant_only
    carbon_stress_elevated_co2_800_ppm_ez55_rnaseq_coculture:
      name: EZ55 Elevated CO2 (800 ppm) vs Ambient CO2 (400 ppm) (RNASEQ)
      organism: Alteromonas macleodii EZ55
      treatment_condition: Elevated CO2 (800 ppm)
      control_condition: Ambient CO2 (400 ppm)
      experimental_context: Co-culture of Alteromonas EZ55 with Prochlorococcus MIT9312 (VOL4) in PEv medium at 21C, 150 umol
        photons m-2 s-1, 14:10 light-dark cycle, acclimated ~10 generations
      omics_type: RNASEQ
      test_type: edgeR
      treatment_type: [carbon]
      background_factors: [coculture, diel]
      medium: PEv medium (artificial seawater with Pro99 nutrients at 1/25 concentration)
      temperature: 21C
      light_condition: 14:10 light-dark cycle
      light_intensity: 150 umol photons m-2 s-1
      table_scope: significant_only
    carbon_stress_elevated_co2_800_ppm_ez55_rnaseq_axenic:
      name: EZ55 Elevated CO2 (800 ppm) vs Ambient CO2 (400 ppm) (RNASEQ)
      organism: Alteromonas macleodii EZ55
      treatment_condition: Elevated CO2 (800 ppm)
      control_condition: Ambient CO2 (400 ppm)
      experimental_context: Axenic Alteromonas EZ55 in PEv medium at 21C, 150 umol photons m-2 s-1, 14:10 light-dark cycle,
        acclimated ~10 generations
      omics_type: RNASEQ
      test_type: edgeR
      treatment_type: [carbon]
      background_factors: [axenic, diel]
      medium: PEv medium (artificial seawater with Pro99 nutrients at 1/25 concentration)
      temperature: 21C
      light_condition: 14:10 light-dark cycle
      light_intensity: 150 umol photons m-2 s-1
      table_scope: significant_only
  supplementary_materials:
    id_translation_mit9312_annot:
      type: id_translation
      filename: data/Prochlorococcus/papers_and_supp/Hennon 2017/Prochlorococcus_marinus_MIT9312_annot.txt
      sep: "\t"
      organism: Prochlorococcus MIT9312
      id_columns:
      - column: cds_fna_id
        id_type: annotation_specific
      - column: old_locus_tag
        id_type: old_locus_tag
      product_columns:
      - column: product
    id_translation_ez55_author:
      type: id_translation
      filename: data/Prochlorococcus/papers_and_supp/Hennon 2017/aez55_to_ez55_id_translation.csv
      organism: Alteromonas macleodii EZ55
      generate:
        method: diamond_protein_match
        source_fasta: data/Prochlorococcus/papers_and_supp/Hennon 2017/EZ55_annotation/ez55_aa.fasta
        source_id_col: aez55_id
        img_gff: data/Prochlorococcus/papers_and_supp/Hennon 2017/EZ55_annotation/EZ55.gff
      id_columns:
      - column: locus_tag
        id_type: locus_tag
      - column: aez55_id
        id_type: old_locus_tag
    supp_table_2:
      type: csv
      filename: data/Prochlorococcus/papers_and_supp/Hennon 2017/PRO DE genes 41396_2018_bfismej2017189_moesm28_esm.csv
      skip_rows: 2
      id_columns:
      - column: locus_tag
        id_type: annotation_specific
      product_columns:
      - column: annotation
      statistical_analyses:
      - id: DE_elevated_co2_vs_ambient_MIT9312_coculture
        experiment: carbon_stress_elevated_co2_800_ppm_mit9312_rnaseq
        timepoint: acclimated
        timepoint_hours: null
        growth_phase: acclimated_steady_state
        name_col: locus_tag
        logfc_col: logFC
        adjusted_p_value_col: PValue
        prefiltered: true
    supp_table_3:
      type: csv
      filename: data/Prochlorococcus/papers_and_supp/Hennon 2017/ALT DE genes 41396_2018_bfismej2017189_moesm29_esm.csv
      skip_rows: 2
      id_columns:
      - column: locus tag
        id_type: old_locus_tag
      product_columns:
      - column: annotation
      statistical_analyses:
      - id: DE_elevated_co2_vs_ambient_EZ55_coculture
        experiment: carbon_stress_elevated_co2_800_ppm_ez55_rnaseq_coculture
        timepoint: acclimated
        timepoint_hours: null
        growth_phase: acclimated_steady_state
        name_col: locus tag
        logfc_col: logFC
        adjusted_p_value_col: PValue
        prefiltered: true
    supp_table_4:
      type: csv
      filename: data/Prochlorococcus/papers_and_supp/Hennon 2017/ALT axenic DE genes 41396_2018_bfismej2017189_moesm30_esm.csv
      skip_rows: 2
      id_columns:
      - column: locus tag
        id_type: old_locus_tag
      product_columns:
      - column: annotation
      statistical_analyses:
      - id: DE_elevated_co2_vs_ambient_EZ55_axenic
        experiment: carbon_stress_elevated_co2_800_ppm_ez55_rnaseq_axenic
        timepoint: acclimated
        timepoint_hours: null
        growth_phase: acclimated_steady_state
        name_col: locus tag
        logfc_col: logFC
        adjusted_p_value_col: PValue
        prefiltered: true
    # supp_table_5 (S5) — KEGG/topic enrichment-set table for the EZ55 coculture
    # experiment. Built from S5 long-format CSV by
    # scripts/build_modified_csv/build_hennon2017_modified_csv.py (one row per
    # gene + 8 boolean Y/blank columns, one per enrichment category).
    # NOTE — duplication: 67 of S5's 128 significant genes already have a
    # Changes_expression_of edge from supp_table_3. Wiring all of S5 produces
    # duplicate edges (different edge `id` from `id_translation` distinct
    # analysis id) for those 67 genes. Accepted for now; revisit if it causes
    # rank-by-effect inflation. The 385 non-significant rows + 30 sig rows
    # missing from S3 are the new evidence.
    supp_table_5_de:
      type: csv
      filename: data/Prochlorococcus/papers_and_supp/Hennon 2017/ALT gene categories for enrichment 41396_2018_bfismej2017189_moesm31_esm_modified.csv
      organism: Alteromonas macleodii EZ55
      id_columns:
      - column: geneID
        id_type: old_locus_tag
      product_columns:
      - column: annot
      statistical_analyses:
      - id: DE_elevated_co2_vs_ambient_EZ55_coculture_enrichment_set
        experiment: carbon_stress_elevated_co2_800_ppm_ez55_rnaseq_coculture
        timepoint: acclimated
        timepoint_hours: null
        growth_phase: acclimated_steady_state
        name_col: geneID
        logfc_col: logFC
        adjusted_p_value_col: PValue
        prefiltered: false
        pvalue_threshold: 0.05
    supp_table_5_categories:
      type: derived_metrics_table
      filename: data/Prochlorococcus/papers_and_supp/Hennon 2017/ALT gene categories for enrichment 41396_2018_bfismej2017189_moesm31_esm_modified.csv
      organism: Alteromonas macleodii EZ55
      experiment: carbon_stress_elevated_co2_800_ppm_ez55_rnaseq_coculture
      name_col: geneID
      id_columns:
      - column: geneID
        id_type: old_locus_tag
      metrics:
      - metric_type: enrichment_bacterial_chemotaxis
        name: "EZ55 enrichment set: Bacterial chemotaxis (Table S5)"
        value_kind: boolean
        value_col: bacterial_chemotaxis
        true_tokens: ["Y"]
        false_tokens: []
        blank_policy: skip
        field_description: "Member of 'Bacterial chemotaxis' KEGG/topic enrichment set used in Hennon 2017 EZ55 coculture analysis"
      - metric_type: enrichment_biosynthesis_of_amino_acids
        name: "EZ55 enrichment set: Biosynthesis of amino acids (Table S5)"
        value_kind: boolean
        value_col: biosynthesis_of_amino_acids
        true_tokens: ["Y"]
        false_tokens: []
        blank_policy: skip
        field_description: "Member of 'Biosynthesis of amino acids' KEGG/topic enrichment set"
      - metric_type: enrichment_carbon_metabolism
        name: "EZ55 enrichment set: Carbon metabolism (Table S5)"
        value_kind: boolean
        value_col: carbon_metabolism
        true_tokens: ["Y"]
        false_tokens: []
        blank_policy: skip
        field_description: "Member of 'Carbon Metabolism' KEGG/topic enrichment set"
      - metric_type: enrichment_fatty_acid_metabolism
        name: "EZ55 enrichment set: Fatty acid metabolism (Table S5)"
        value_kind: boolean
        value_col: fatty_acid_metabolism
        true_tokens: ["Y"]
        false_tokens: []
        blank_policy: skip
        field_description: "Member of 'Fatty Acid Metabolism' KEGG/topic enrichment set"
      - metric_type: enrichment_flagellar_assembly
        name: "EZ55 enrichment set: Flagellar assembly (Table S5)"
        value_kind: boolean
        value_col: flagellar_assembly
        true_tokens: ["Y"]
        false_tokens: []
        blank_policy: skip
        field_description: "Member of 'Flagellar assembly' KEGG/topic enrichment set"
      - metric_type: enrichment_redox_genes
        name: "EZ55 enrichment set: Redox genes (Table S5)"
        value_kind: boolean
        value_col: redox_genes
        true_tokens: ["Y"]
        false_tokens: []
        blank_policy: skip
        field_description: "Member of 'Redox genes' enrichment set"
      - metric_type: enrichment_ribosome
        name: "EZ55 enrichment set: Ribosome (Table S5)"
        value_kind: boolean
        value_col: ribosome
        true_tokens: ["Y"]
        false_tokens: []
        blank_policy: skip
        field_description: "Member of 'Ribosome' KEGG/topic enrichment set"
      - metric_type: enrichment_tonb_associated_genes
        name: "EZ55 enrichment set: TonB-associated genes (Table S5)"
        value_kind: boolean
        value_col: tonb_associated_genes
        true_tokens: ["Y"]
        false_tokens: []
        blank_policy: skip
        field_description: "Member of 'TonB-associated genes' enrichment set"
