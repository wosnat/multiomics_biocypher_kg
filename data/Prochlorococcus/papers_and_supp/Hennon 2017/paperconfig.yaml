publication:
  papername: Hennon 2017
  papermainpdf: data/Prochlorococcus/papers_and_supp/Hennon 2017/41396_2018_article_bfismej2017189.pdf
  experiments:
    carbon_stress_elevated_co2_800_ppm_mit9312_rnaseq:
      name: MIT9312 Elevated CO2 (800 ppm) vs Ambient CO2 (400 ppm) (RNASEQ)
      organism: Prochlorococcus MIT9312
      treatment_condition: Elevated CO2 (800 ppm)
      control_condition: Ambient CO2 (400 ppm)
      experimental_context: Co-culture of Prochlorococcus MIT9312 (VOL4) with Alteromonas EZ55 in PEv medium at 21C, 150 umol
        photons m-2 s-1, 14:10 light-dark cycle, acclimated ~10 generations
      omics_type: RNASEQ
      test_type: edgeR
      treatment_type: carbon_stress
      medium: PEv medium (artificial seawater with Pro99 nutrients at 1/25 concentration)
      temperature: 21C
      light_condition: 14:10 light-dark cycle
      light_intensity: 150 umol photons m-2 s-1
    carbon_stress_elevated_co2_800_ppm_ez55_rnaseq_coculture:
      name: EZ55 Elevated CO2 (800 ppm) vs Ambient CO2 (400 ppm) (RNASEQ)
      organism: Alteromonas macleodii EZ55
      treatment_condition: Elevated CO2 (800 ppm)
      control_condition: Ambient CO2 (400 ppm)
      experimental_context: Co-culture of Alteromonas EZ55 with Prochlorococcus MIT9312 (VOL4) in PEv medium at 21C, 150 umol
        photons m-2 s-1, 14:10 light-dark cycle, acclimated ~10 generations
      omics_type: RNASEQ
      test_type: edgeR
      treatment_type: carbon_stress
      medium: PEv medium (artificial seawater with Pro99 nutrients at 1/25 concentration)
      temperature: 21C
      light_condition: 14:10 light-dark cycle
      light_intensity: 150 umol photons m-2 s-1
    carbon_stress_elevated_co2_800_ppm_ez55_rnaseq_axenic:
      name: EZ55 Elevated CO2 (800 ppm) vs Ambient CO2 (400 ppm) (RNASEQ)
      organism: Alteromonas macleodii EZ55
      treatment_condition: Elevated CO2 (800 ppm)
      control_condition: Ambient CO2 (400 ppm)
      experimental_context: Axenic Alteromonas EZ55 in PEv medium at 21C, 150 umol photons m-2 s-1, 14:10 light-dark cycle,
        acclimated ~10 generations
      omics_type: RNASEQ
      test_type: edgeR
      treatment_type: carbon_stress
      medium: PEv medium (artificial seawater with Pro99 nutrients at 1/25 concentration)
      temperature: 21C
      light_condition: 14:10 light-dark cycle
      light_intensity: 150 umol photons m-2 s-1
  supplementary_materials:
    id_translation_mit9312_annot:
      type: id_translation
      filename: data/Prochlorococcus/papers_and_supp/Hennon 2017/Prochlorococcus_marinus_MIT9312_annot.txt
      sep: "\t"
      organism: Prochlorococcus MIT9312
      id_columns:
      - column: cds_fna_id
        id_type: annotation_specific
      - column: old_locus_tag
        id_type: old_locus_tag
      product_columns:
      - column: product
    id_translation_ez55_author:
      type: id_translation
      filename: data/Prochlorococcus/papers_and_supp/Hennon 2017/aez55_to_ez55_id_translation.csv
      organism: Alteromonas macleodii EZ55
      generate:
        method: diamond_protein_match
        source_fasta: data/Prochlorococcus/papers_and_supp/Hennon 2017/EZ55_annotation/ez55_aa.fasta
        source_id_col: aez55_id
        img_gff: data/Prochlorococcus/papers_and_supp/Hennon 2017/EZ55_annotation/EZ55.gff
      id_columns:
      - column: locus_tag
        id_type: locus_tag
      - column: aez55_id
        id_type: old_locus_tag
    supp_table_2:
      type: csv
      filename: data/Prochlorococcus/papers_and_supp/Hennon 2017/PRO DE genes 41396_2018_bfismej2017189_moesm28_esm.csv
      skip_rows: 2
      id_columns:
      - column: locus_tag
        id_type: annotation_specific
      product_columns:
      - column: annotation
      statistical_analyses:
      - id: DE_elevated_co2_vs_ambient_MIT9312_coculture
        experiment: carbon_stress_elevated_co2_800_ppm_mit9312_rnaseq
        timepoint_hours: null
        name_col: locus_tag
        logfc_col: logFC
        adjusted_p_value_col: PValue
        prefiltered: true
    supp_table_3:
