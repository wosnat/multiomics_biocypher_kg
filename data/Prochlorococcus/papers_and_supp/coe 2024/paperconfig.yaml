      treatment_condition: Dark-tolerant co-culture under 13:11 diel light:dark cycle
      control_condition: Parental co-culture under 13:11 diel light:dark cycle
      experimental_context: Co-culture with Alteromonas macleodii MIT1002 in Pro99 medium at 24C under 13:11 light:dark cycle
        at 37 umol photons m-2 s-1
      omics_type: RNASEQ
      test_type: DESeq2
      treatment_type: [darkness]
      background_factors: [coculture, diel]
      medium: Pro99 natural seawater medium
      temperature: 24C
      light_condition: 13:11 light:dark cycle with simulated dawn and dusk
      light_intensity: 37 umol photons m-2 s-1
      table_scope: significant_any_timepoint
