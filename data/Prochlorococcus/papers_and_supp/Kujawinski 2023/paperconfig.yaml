    presence_flags_table_s2:
      type: metabolite_assays_table
      filename: "data/Prochlorococcus/papers_and_supp/Kujawinski 2023/table s2.csv"
      experiment: kujawinski_metabolomics_9301_whole_cell
      organism: "Prochlorococcus MIT9301"
      name_col: "metabolite"
      cell_format: numeric
      aliases_file: "metabolite_aliases.yaml"
      assays:
        - metric_type: presence_flag_intracellular
          name: "Detected in intracellular pool (Kujawinski 2023 Table S2)"
          value_kind: boolean
          unit: ""
          rankable: "false"
          field_description: >-
            Boolean flag: metabolite detected in intracellular pool of any sampled
            Prochlorococcus strain (Kujawinski 2023 Table S2). Paper-level flag,
            anchored to the MIT9301 intracellular Experiment for binding only.
          sample_columns:
            - condition_label: ""
              flag_column: "intracellular"
              flag_true_value: "yes"
        - metric_type: presence_flag_extracellular
          name: "Detected in extracellular pool (Kujawinski 2023 Table S2)"
          value_kind: boolean
          unit: ""
          rankable: "false"
          field_description: >-
            Boolean flag: metabolite detected in extracellular pool of any sampled
            Prochlorococcus strain (Kujawinski 2023 Table S2). Paper-level flag.
          sample_columns:
            - condition_label: ""
              flag_column: "extracellular"
              flag_true_value: "yes"
