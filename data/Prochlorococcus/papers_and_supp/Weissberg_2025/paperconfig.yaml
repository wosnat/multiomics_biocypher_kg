      filename: "data/Prochlorococcus/papers_and_supp/Weissberg_2025/HOT1A3__rnaseq__axenic_HOT1A3__day_18__vs__day_11.csv"
      organism: "Alteromonas macleodii HOT1A3"
      id_columns:
        - column: "gene_id"
          id_type: locus_tag_ncbi
      statistical_analyses:
        - type: RNASEQ
          name: "DE of Alteromonas HOT1A3 axenic day 18 vs day 11"
          id: DE_hot1a3_rnaseq_axenic_day_18_vs_day_11
          test_type: DESeq2
          control_condition: "Exponential growth (day 11)"
          treatment_condition: "Nutrient starvation (day 18)"
          environmental_control_condition_id: weissberg_2025_pro99_lown_exponential
          environmental_treatment_condition_id: weissberg_2025_pro99_lown_starvation
          experimental_context: "Axenic Alteromonas HOT1A3 in PRO99-lowN at 24C under continuous light"
          timepoint: "day 18"
          organism: "Alteromonas macleodii HOT1A3"
          name_col: "gene_id"
