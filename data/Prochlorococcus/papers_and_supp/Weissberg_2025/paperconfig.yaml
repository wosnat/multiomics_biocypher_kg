publication:
  papername: "Weissberg 2025"
  papermainpdf: "data/Prochlorococcus/papers_and_supp/Weissberg_2025/cc1a3_bioax_2025.pdf"

  environmental_conditions:
    weissberg_2025_pro99_lown_exponential:
      condition_type: growth_state
      name: "PRO99-lowN exponential growth"
      description: "Prochlorococcus and Alteromonas in PRO99-lowN medium during nutrient-replete exponential growth phase, before nitrogen depletion."
      medium: "PRO99-lowN"
      temperature: "24C"
      light_condition: "continuous light"
    weissberg_2025_pro99_lown_starvation:
      condition_type: growth_state
      name: "PRO99-lowN nutrient starvation"
      description: "Prochlorococcus and Alteromonas in PRO99-lowN medium after nitrogen depletion. Cells undergo decline, death (axenic Prochlorococcus), or prolonged survival (coculture). Alteromonas is carbon-limited."
      medium: "PRO99-lowN"
      temperature: "24C"
      light_condition: "continuous light"

  supplementary_materials:

    # =========================================================================
    # HOT1A3 (Alteromonas macleodii HOT1A3) — RNA-seq, axenic time course
