publication:
  papername: "Barreto 2022"
  papermainpdf: "data/Prochlorococcus/papers_and_supp/barreto 2022/43705_2022_article_197.pdf"

  environmental_conditions:
    barreto_2022_ambient_pco2:
      condition_type: carbon_stress
      name: "Ambient pCO2 (400 ppm)"
      co2_level: "400 ppm"
      medium: "Pro99 medium"
      description: "Growth at ambient pCO2 (400 ppm CO2)"

    barreto_2022_elevated_pco2:
      condition_type: carbon_stress
      name: "Elevated pCO2 (800 ppm)"
      co2_level: "800 ppm"
      medium: "Pro99 medium"
      description: "Growth at elevated pCO2 (800 ppm CO2)"

  supplementary_materials:
    # Annotation file for Prochlorococcus MIT9312: bridges old locus tags and gene names
    # GID = old locus tag (PMT9312_NNNN), SYMBOL = gene name (when annotated)
    id_translation_pro_9312:
      type: id_translation
      filename: "data/Prochlorococcus/papers_and_supp/barreto 2022/pro_9312_anot.csv"
      organism: "Prochlorococcus MIT9312"
      id_columns:
        - column: GID
          id_type: old_locus_tag
        - column: SYMBOL
          id_type: gene_name
        - column: uniprot_acc
          id_type: uniprot_accession
      product_columns:
        - column: PRODUCT

    # Annotation file for Synechococcus CC9311: bridges locus tags and gene names
    # GID = locus tag (sync_NNNN), genename = gene name (when annotated)
    id_translation_syn_9311:
      type: id_translation
      filename: "data/Prochlorococcus/papers_and_supp/barreto 2022/syn_9311.csv"
      organism: "Synechococcus CC9311"
      id_columns:
        - column: GID
          id_type: locus_tag
        - column: genename
          id_type: gene_name
        - column: uniprot_acc
          id_type: uniprot_accession
      product_columns:
        - column: definition

    # Annotation file for Synechococcus WH8102: bridges locus tags and gene names
    # GID = locus tag (SYNW0001), SYMBOL = gene name (when annotated)
    id_translation_syn_8102:
      type: id_translation
      filename: "data/Prochlorococcus/papers_and_supp/barreto 2022/syn_8102_anot.csv"
      organism: "Synechococcus WH8102"
      id_columns:
        - column: GID
          id_type: locus_tag
        - column: SYMBOL
          id_type: gene_name
        - column: uniprot_acc
          id_type: uniprot_accession
      product_columns:
        - column: PRODUCT

    # Paper-supplied GTF for Alteromonas EZ55 genome reannotation.
    # Bridges EZ55 gene symbols to canonical locus tags for build_gene_id_mapping.py.
    annotation_gtf_ez55:
      type: annotation_gff
      filename: "data/Prochlorococcus/papers_and_supp/barreto 2022/EZ55.exon.fixed2.gtf"
      organism: "Alteromonas macleodii EZ55"

    # Table S1: pCO2 effect on picocyanobacteria (split per species from original table_S1.csv)
    supp_table_S1_MIT9312:
      type: csv
      filename: "data/Prochlorococcus/papers_and_supp/barreto 2022/transcriptome_supplemental_tables/Supplemental_tables/table_S1_MIT9312.csv"
      id_columns:
      - column: symbol
        id_type: gene_name
      product_columns:
      - column: product
      statistical_analyses:
        - type: RNASEQ
          name: "DE of Prochlorococcus MIT9312 at elevated (800 ppm) vs ambient (400 ppm) pCO2"
          id: DE_pco2_elevated_vs_ambient_MIT9312
          test_type: edgeR
          control_condition: "Ambient pCO2 (400 ppm)"
          treatment_condition: "Elevated pCO2 (800 ppm)"
          experimental_context: "In Pro99 medium, axenic and coculture conditions with Alteromonas EZ55"
          organism: "Prochlorococcus MIT9312"
          environmental_control_condition_id: barreto_2022_ambient_pco2
          environmental_treatment_condition_id: barreto_2022_elevated_pco2
          name_col: symbol
          logfc_col: logFC
          adjusted_p_value_col: PValue
          pvalue_threshold: 0.05

    supp_table_S1_CC9311:
      type: csv
      filename: "data/Prochlorococcus/papers_and_supp/barreto 2022/transcriptome_supplemental_tables/Supplemental_tables/table_S1_CC9311.csv"
      id_columns:
      - column: symbol
        id_type: gene_name
      product_columns:
      - column: product
      statistical_analyses:
        - type: RNASEQ
          name: "DE of Synechococcus CC9311 at elevated (800 ppm) vs ambient (400 ppm) pCO2"
          id: DE_pco2_elevated_vs_ambient_CC9311
          test_type: edgeR
          control_condition: "Ambient pCO2 (400 ppm)"
          treatment_condition: "Elevated pCO2 (800 ppm)"
          experimental_context: "In Pro99 medium, axenic and coculture conditions with Alteromonas EZ55"
          organism: "Synechococcus CC9311"
          environmental_control_condition_id: barreto_2022_ambient_pco2
          environmental_treatment_condition_id: barreto_2022_elevated_pco2
          name_col: symbol
          logfc_col: logFC
          adjusted_p_value_col: PValue
          pvalue_threshold: 0.05

    supp_table_S1_WH8102:
      type: csv
      filename: "data/Prochlorococcus/papers_and_supp/barreto 2022/transcriptome_supplemental_tables/Supplemental_tables/table_S1_WH8102.csv"
      id_columns:
