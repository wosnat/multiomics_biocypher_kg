publication:
  papername: Fang 2019
  papermainpdf: data/Prochlorococcus/papers_and_supp/Fang 2019/Fang 2015 Prochlorococcus mit9313 Transcriptomic responses
    to viral lysis products.pdf
  experiments:
    viral_viral_dom_vdom_addition_mit9313_rnaseq:
      name: MIT9313 Viral DOM (vDOM) addition vs Pro99 growth medium control (RNASEQ)
      organism: Prochlorococcus MIT9313
      treatment_condition: Viral DOM (vDOM) addition
      control_condition: Pro99 growth medium control
      experimental_context: Axenic Prochlorococcus MIT9313 in Pro99 medium at 24C under continuous light at 15-20 umol quanta
        m-2 s-1
      omics_type: RNASEQ
      test_type: DESeq2
      treatment_type: viral
      medium: Pro99 natural seawater medium amended with vDOM
      temperature: 24C
      light_condition: continuous_light
      light_intensity: 15-20 umol quanta m-2 s-1
