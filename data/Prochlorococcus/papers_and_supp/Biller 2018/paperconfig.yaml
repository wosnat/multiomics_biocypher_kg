publication:
  papername: Biller 2018
  papermainpdf: data/Prochlorococcus/papers_and_supp/Biller 2018/biller-et-al-2018-heterotroph-interactions-alter-prochlorococcus-transcriptome-dynamics-during-extended-periods-of.pdf
  experiments:
    darkness_extended_darkness_natl2a_rnaseq_axenic:
      name: NATL2A Extended darkness vs 13:11 diel light:dark cycle control (RNASEQ)
      organism: Prochlorococcus NATL2A
      treatment_condition: Extended darkness
      control_condition: 13:11 diel light:dark cycle control
      experimental_context: Axenic Prochlorococcus NATL2A in Pro99 medium at 24C, bubbled with air
      omics_type: RNASEQ
      test_type: DESeq2
      treatment_type: [darkness]
      background_factors: [axenic, diel]
      medium: Pro99 natural seawater medium
      temperature: 24C
      light_condition: continuous darkness
      light_intensity: 0 umol photons m-2 s-1
      table_scope: significant_any_timepoint
    darkness_extended_darkness_natl2a_rnaseq_coculture:
      name: NATL2A Extended darkness vs 13:11 diel light:dark cycle control (RNASEQ)
      organism: Prochlorococcus NATL2A
      treatment_condition: Extended darkness
      control_condition: 13:11 diel light:dark cycle control
      experimental_context: Prochlorococcus NATL2A co-cultured with Alteromonas macleodii MIT1002 in Pro99 medium at 24C,
        bubbled with air
      omics_type: RNASEQ
      test_type: DESeq2
      treatment_type: [darkness]
      background_factors: [coculture, diel]
      medium: Pro99 natural seawater medium
      temperature: 24C
      light_condition: continuous darkness
      light_intensity: 0 umol photons m-2 s-1
      table_scope: significant_any_timepoint
    darkness_extended_darkness_mit1002_rnaseq:
      name: MIT1002 Extended darkness vs 13:11 diel light:dark cycle control (RNASEQ)
      organism: Alteromonas macleodii MIT1002
      treatment_condition: Extended darkness
      control_condition: 13:11 diel light:dark cycle control
      experimental_context: Alteromonas macleodii MIT1002 co-cultured with Prochlorococcus NATL2A in Pro99 medium at 24C,
        bubbled with air
      omics_type: RNASEQ
      test_type: DESeq2
      treatment_type: [darkness]
      background_factors: [coculture, diel]
      medium: Pro99 natural seawater medium
      temperature: 24C
      light_condition: continuous darkness
      light_intensity: 0 umol photons m-2 s-1
      table_scope: significant_only
      table_scope_detail: Consistently DE at 1-5h extended darkness
  supplementary_materials:
    annotation_gff_mit1002_old_draft:
      type: annotation_gff
      filename: cache/data/Alteromonas/genomes/MIT1002/genomic_old_draft_GCF_001077695.1.gff
      organism: Alteromonas macleodii MIT1002
    id_translation_mit1002_rast_diamond:
      type: id_translation
      filename: data/Prochlorococcus/papers_and_supp/Biller 2018/MIT1002_RAST_annotation/rast_to_mit1002_id_translation.csv
      organism: Alteromonas macleodii MIT1002
      generate:
        method: diamond_protein_match
        source_fasta: data/Prochlorococcus/papers_and_supp/Biller 2018/MIT1002_RAST_annotation/226.6.faa
        source_id_col: rast_fig_id
      id_columns:
      - column: locus_tag
        id_type: locus_tag
      - column: rast_fig_id
        id_type: old_locus_tag
    id_translation_mit1002_rast_names:
      type: id_translation
      filename: data/Prochlorococcus/papers_and_supp/Biller 2018/MIT1002_systematicnames_conversiontable.csv
      organism: Alteromonas macleodii MIT1002
      id_columns:
      - column: original_rast_id
        id_type: old_locus_tag
      - column: genbank_id
        id_type: alternative_locus_tag
      - column: assembly_coordinates
        id_type: alternative_locus_tag
    supp_table_s3:
      type: csv
      filename: data/Prochlorococcus/papers_and_supp/Biller 2018/table S3 DE genes natl2a axenic extended darkness sys003182233st3.csv
      id_columns:
      - column: NCBI ID_3
        id_type: old_locus_tag
      - column: NCBI ID_2
        id_type: locus_tag_ncbi
      - column: NCBI ID
        id_type: locus_tag_cyanorak
      - column: Gene Name
        id_type: gene_name
      product_columns:
      - column: Genbank Annotation
      - column: RAST annotation
      statistical_analyses:
      - id: DE_extended_darkness_vs_diel_axenic_NATL2A_1h
        experiment: darkness_extended_darkness_natl2a_rnaseq_axenic
        timepoint: 1h extended darkness (36h)
        timepoint_hours: 36.0
        growth_phase: darkness
        name_col: NCBI ID_3
        logfc_col: Axenic, 36 hours
        pvalue_threshold: 0.1
        pvalue_asterisk_in_logfc: true
      - id: DE_extended_darkness_vs_diel_axenic_NATL2A_5h
        experiment: darkness_extended_darkness_natl2a_rnaseq_axenic
        timepoint: 5h extended darkness (40h)
        timepoint_hours: 40.0
        growth_phase: darkness
        name_col: NCBI ID_3
        logfc_col: Axenic, 40 hours
        pvalue_threshold: 0.1
        pvalue_asterisk_in_logfc: true
      - id: DE_extended_darkness_vs_diel_axenic_NATL2A_13h
        experiment: darkness_extended_darkness_natl2a_rnaseq_axenic
        timepoint: 13h extended darkness (48h)
        timepoint_hours: 48.0
        growth_phase: darkness
        name_col: NCBI ID_3
        logfc_col: Axenic, 48 hours
        pvalue_threshold: 0.1
        pvalue_asterisk_in_logfc: true
      - id: DE_extended_darkness_vs_diel_coculture_NATL2A_1h
        experiment: darkness_extended_darkness_natl2a_rnaseq_coculture
        timepoint: 1h extended darkness (36h)
        timepoint_hours: 36.0
        growth_phase: darkness
        name_col: NCBI ID_3
        logfc_col: Co-culture, 36 hours
        pvalue_threshold: 0.1
        pvalue_asterisk_in_logfc: true
      - id: DE_extended_darkness_vs_diel_coculture_NATL2A_5h
        experiment: darkness_extended_darkness_natl2a_rnaseq_coculture
        timepoint: 5h extended darkness (40h)
        timepoint_hours: 40.0
        growth_phase: darkness
        name_col: NCBI ID_3
        logfc_col: Co-culture, 40 hours
        pvalue_threshold: 0.1
        pvalue_asterisk_in_logfc: true
      - id: DE_extended_darkness_vs_diel_coculture_NATL2A_13h
        experiment: darkness_extended_darkness_natl2a_rnaseq_coculture
        timepoint: 13h extended darkness (48h)
        timepoint_hours: 48.0
        growth_phase: darkness
        name_col: NCBI ID_3
        logfc_col: Co-culture, 48 hours
        pvalue_threshold: 0.1
        pvalue_asterisk_in_logfc: true
    supp_table_s6b:
      type: csv
      filename: data/Prochlorococcus/papers_and_supp/Biller 2018/table S6B DE genes in extended darkness MIT1002 sys003182233st6.csv
      id_columns:
      - column: RAST_region_ID
        id_type: alternative_locus_tag
      product_columns:
      - column: RAST_Annotation
      statistical_analyses:
      - id: DE_extended_darkness_vs_diel_MIT1002_1h
        experiment: darkness_extended_darkness_mit1002_rnaseq
        timepoint: 1h extended darkness
        timepoint_hours: 1.0
        growth_phase: darkness
        name_col: RAST_region_ID
        logfc_col: 1hr extended darkness (dark/diel)
        pvalue_threshold: 0.1
        prefiltered: true
      - id: DE_extended_darkness_vs_diel_MIT1002_5h
        experiment: darkness_extended_darkness_mit1002_rnaseq
        timepoint: 5h extended darkness
        timepoint_hours: 5.0
        growth_phase: darkness
        name_col: RAST_region_ID
        logfc_col: 5hr extended darkness (dark/diel)
        pvalue_threshold: 0.1
        prefiltered: true
    # S4A is split into two derived_metrics_table entries — one per parent
    # Experiment — because the spec pins one DerivedMetric per (Experiment ×
    # metric_type) and S4A reports periodicity signals from BOTH the axenic
    # NATL2A experiment (cols "in axenic, L:D" + "in axenic, extended darkness")
    # and the coculture NATL2A experiment (cols "in co-cultured, L:D" + "in
    # co-cultured, extended darkness"). Both entries share the same source CSV
    # file and id_columns but select disjoint value_col sets. The deleted
    # gene_clusters entry preserved this dual attribution via a 2-element
    # `experiments:` list; derived_metrics_table has no such list — the split
    # restores the attribution.
    natl2a_periodicity_axenic_derived_metrics:
      type: derived_metrics_table
      filename: data/Prochlorococcus/papers_and_supp/Biller 2018/table s4A sys003182233st4.csv
      organism: Prochlorococcus NATL2A
      experiment: darkness_extended_darkness_natl2a_rnaseq_axenic
      name_col: NCBI ID_2
      id_columns:
      - column: NCBI ID_2
        id_type: locus_tag_ncbi
      - column: NCBI ID_3
        id_type: old_locus_tag
      - column: NCBI ID
        id_type: locus_tag_cyanorak
      metrics:
      - metric_type: periodic_in_axenic_LD
        value_kind: boolean
        value_col: "Periodic in axenic, L:D cultures"
        true_tokens: ["Y"]
        false_tokens: []
        skip_tokens: ["NA", "N/A"]
        blank_policy: skip
        field_description: "RAIN periodicity FDR<0.05 in NATL2A axenic L:D (Table S4A)"
      - metric_type: periodic_in_axenic_extended_darkness
        value_kind: boolean
        value_col: "Periodic in axenic, extended darkness cultures"
        true_tokens: ["Y"]
        false_tokens: []
        skip_tokens: ["NA", "N/A"]
        blank_policy: skip
        field_description: "RAIN periodicity FDR<0.05 in NATL2A axenic extended darkness (Table S4A)"

    natl2a_periodicity_coculture_derived_metrics:
      type: derived_metrics_table
      filename: data/Prochlorococcus/papers_and_supp/Biller 2018/table s4A sys003182233st4.csv
      organism: Prochlorococcus NATL2A
      experiment: darkness_extended_darkness_natl2a_rnaseq_coculture
      name_col: NCBI ID_2
      id_columns:
      - column: NCBI ID_2
        id_type: locus_tag_ncbi
      - column: NCBI ID_3
        id_type: old_locus_tag
      - column: NCBI ID
        id_type: locus_tag_cyanorak
      metrics:
      - metric_type: periodic_in_coculture_LD
        value_kind: boolean
        value_col: "Periodic in co-cultured, L:D cultures"
        true_tokens: ["Y"]
        false_tokens: []
        skip_tokens: ["NA", "N/A"]
        blank_policy: skip
        field_description: "RAIN periodicity FDR<0.05 in NATL2A coculture L:D (Table S4A)"
      - metric_type: periodic_in_coculture_extended_darkness
        value_kind: boolean
        value_col: "Periodic in co-cultured, extended darkness cultures"
        true_tokens: ["Y"]
        false_tokens: []
        skip_tokens: ["NA", "N/A"]
        blank_policy: skip
        field_description: "RAIN periodicity FDR<0.05 in NATL2A coculture extended darkness (Table S4A)"

    mit1002_periodicity_derived_metrics:
      type: derived_metrics_table
      filename: data/Prochlorococcus/papers_and_supp/Biller 2018/table s4B sys003182233st4.csv
      organism: Alteromonas macleodii MIT1002
      experiment: darkness_extended_darkness_mit1002_rnaseq
      name_col: Locus ID
      id_columns:
      # S4B's `Locus ID` column contains 4-digit MIT1002_0002 values. Canonical
      # NCBI MIT1002 locus tags are 5-digit (MIT1002_00013); the 4-digit form
      # matches the `genbank_id` column of MIT1002_systematicnames_conversiontable.csv,
      # which the existing id_translation_mit1002_rast_names entry declares as
      # `alternative_locus_tag`. Use the same id_type here so build_gene_id_mapping
      # bridges 4-digit → canonical via the existing transitive closure.
      - column: Locus ID
        id_type: alternative_locus_tag
      metrics:
      - metric_type: periodic_in_coculture_LD
        value_kind: boolean
        value_col: "Periodic in co-cultured, L:D cultures"
        true_tokens: ["Y"]
        false_tokens: []
        skip_tokens: ["NA", "N/A"]
        blank_policy: skip
        field_description: "RAIN periodicity FDR<0.05 in MIT1002 coculture L:D (Table S4B)"
      - metric_type: periodic_in_coculture_extended_darkness
        value_kind: boolean
        value_col: "Periodic in co-cultured, extended darkness cultures"
        true_tokens: ["Y"]
        false_tokens: []
        skip_tokens: ["NA", "N/A"]
        blank_policy: skip
        field_description: "RAIN periodicity FDR<0.05 in MIT1002 coculture extended darkness (Table S4B)"

    # S5's darkness_cluster is a SINGLE composite column mixing axenic and
    # coculture signals into one categorical label per gene; it cannot be split
    # column-wise like S4A. The deleted gene_clusters entry linked S5 to both
    # axenic and coculture NATL2A experiments via its `experiments:` list;
    # derived_metrics_table has a single `experiment:` field, so we attribute
    # to the axenic experiment as the canonical parent. The composite label
    # itself encodes the cross-condition information, so the cross-experiment
    # attribution is not lost — it lives in the category names. All 4 id_columns
    # from the deleted entry are preserved, including `Gene Name` → gene_name.
    natl2a_darkness_survival_derived_metrics:
      type: derived_metrics_table
      filename: data/Prochlorococcus/papers_and_supp/Biller 2018/table S5 sys003182233st5.csv
      organism: Prochlorococcus NATL2A
      experiment: darkness_extended_darkness_natl2a_rnaseq_axenic
      name_col: NCBI ID_2
      id_columns:
      - column: NCBI ID_2
        id_type: locus_tag_ncbi
      - column: NCBI ID_3
        id_type: old_locus_tag
      - column: NCBI ID
        id_type: locus_tag_cyanorak
      - column: Gene Name
        id_type: gene_name
      metrics:
      - metric_type: darkness_survival_class
        value_kind: categorical
        value_col: darkness_cluster
        # allowed_categories are the 3 distinct composite strings actually
        # present in the CSV's darkness_cluster column (verified: 100 / 90 /
        # 79 rows). Under option C, this list lives on the paperconfig, not
        # the central vocab — categorical class vocabularies are per-paper.
        allowed_categories:
        - darkness_axenic+darkness_coculture
        - darkness_coculture+unique_coculture
        - darkness_axenic+unique_axenic
        field_description: "Transcript presence at 72-144h extended darkness, axenic vs coculture (Biller 2018 Table S5)"
