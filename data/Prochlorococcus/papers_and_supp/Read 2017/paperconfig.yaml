publication:
  papername: "Read 2017"
  papermainpdf: "data/Prochlorococcus/papers_and_supp/Read 2017/41396_2017_article_bfismej201788.pdf"

  environmental_conditions:
    read_2017_n_replete:
      condition_type: growth_medium
      name: "N-replete Pro99 medium"
      medium: "Pro99 with 800 µM ammonium chloride"
      temperature: "25C"
      light_condition: "continuous_light"
      light_intensity: "~55 umol photons m-2 s-1"
      nitrogen_source: "ammonium (800 µM)"
      description: "Axenic Prochlorococcus MED4 in N-replete Pro99 medium prepared with seawater from 20m depth in the South Pacific Subtropical Gyre, supplemented with 800 µM ammonium chloride"
    read_2017_n_depleted:
      condition_type: nutrient_stress
      name: "N-depleted Pro99 medium"
      medium: "Pro99 without ammonium (N-depleted)"
      temperature: "25C"
      light_condition: "continuous_light"
      light_intensity: "~55 umol photons m-2 s-1"
      nitrogen_source: "none (N-depleted)"
      description: "Axenic Prochlorococcus MED4 resuspended in N-depleted Pro99 media lacking ammonium chloride; nitrogen starvation experiment"

  supplementary_materials:
    supp_3h_post_starvation:
      type: csv
      filename: "data/Prochlorococcus/papers_and_supp/Read 2017/DE_genes_3h_post_starvation.csv"
      statistical_analyses:
        - type: RNASEQ
          name: "DE of Prochlorococcus MED4 under N-deprivation vs N-replete at 3h post N-removal"
          id: DE_N_depleted_vs_replete_MED4_3h
          test_type: "Rockhopper/DESeq"
          control_condition: "N-replete"
          treatment_condition: "N-depleted"
          environmental_control_condition_id: read_2017_n_replete
          environmental_treatment_condition_id: read_2017_n_depleted
          experimental_context: "Axenic Prochlorococcus MED4 in Pro99 medium at 25C under continuous light (~55 µmol photons m-2 s-1); TEX-treated RNA sequenced on Ion Torrent platform; results include genes with expression values in the top 50% of the dataset"
          timepoint: "3h"
          organism: "Prochlorococcus MED4"
          name_col: locus_tag
          logfc_col: log2_fold_change
          adjusted_p_value_col: p_value
          pvalue_threshold: 0.05

    supp_12h_post_starvation:
      type: csv
      filename: "data/Prochlorococcus/papers_and_supp/Read 2017/DE_genes_12h_post_starvation.csv"
      statistical_analyses:
