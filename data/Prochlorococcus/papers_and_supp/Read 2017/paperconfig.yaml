publication:
  papername: Read 2017
  papermainpdf: data/Prochlorococcus/papers_and_supp/Read 2017/41396_2017_article_bfismej201788.pdf
  experiments:
    nitrogen_stress_ndepleted_pro99_medium_med4_rnaseq:
      name: MED4 N-depleted Pro99 medium vs N-replete Pro99 medium (RNASEQ)
      organism: Prochlorococcus MED4
      treatment_condition: N-depleted Pro99 medium
      control_condition: N-replete Pro99 medium
      experimental_context: Axenic Prochlorococcus MED4 in Pro99 medium at 25C under continuous light (~55 umol photons m-2
        s-1); TEX-treated RNA sequenced on Ion Torrent platform; results include genes with expression values in the top 50%
        of the dataset
      omics_type: RNASEQ
      test_type: Rockhopper
      treatment_type: [nitrogen]
      background_factors: [axenic, light]
      medium: Pro99 without ammonium (N-depleted)
      temperature: 25C
      light_condition: continuous light
      light_intensity: ~55 umol photons m-2 s-1
      table_scope: filtered_subset
      table_scope_detail: Top 50% of genes by expression level
  supplementary_materials:
    supp_3h_post_starvation:
      type: csv
      filename: data/Prochlorococcus/papers_and_supp/Read 2017/DE_genes_3h_post_starvation.csv
      id_columns:
      - column: locus_tag
        id_type: locus_tag
      product_columns:
      - column: definition
      statistical_analyses:
      - id: DE_N_depleted_vs_replete_MED4_3h
        experiment: nitrogen_stress_ndepleted_pro99_medium_med4_rnaseq
        timepoint: 3h
        timepoint_hours: 3.0
        growth_phase: acute_stress
        name_col: locus_tag
        logfc_col: log2_fold_change
        adjusted_p_value_col: p_value
        pvalue_threshold: 0.05
    supp_12h_post_starvation:
