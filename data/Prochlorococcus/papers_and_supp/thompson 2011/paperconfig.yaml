publication:
  papername: Thompson 2011
  papermainpdf: data/Prochlorococcus/papers_and_supp/thompson 2011/41396_2011_article_bfismej201149.pdf
  experiments:
    iron_iron_starvation_med4_med4_microarray_light:
      name: MED4 Iron starvation (MED4) vs Iron-replete control (MED4) (MICROARRAY)
      organism: Prochlorococcus MED4
      treatment_condition: Iron starvation (MED4)
      control_condition: Iron-replete control (MED4)
      experimental_context: Prochlorococcus MED4 in PRO99 at 21C under continuous light at 27 umol photons m-2 s-1
      omics_type: MICROARRAY
      test_type: microarray_Cyber-T
      treatment_type: [iron]
      background_factors: [axenic, light]
      medium: PRO99 modified for trace-metal clean work, no added iron
      temperature: 21C
      light_condition: continuous light
      light_intensity: 27 umol photons m-2 s-1
      table_scope: significant_any_timepoint
    iron_iron_starvation_med4_med4_microarray_light_2:
      name: MED4 Iron starvation (MED4) vs Iron-replete control (MED4) (MICROARRAY)
      organism: Prochlorococcus MED4
      treatment_condition: Iron starvation (MED4)
      control_condition: Iron-replete control (MED4)
      experimental_context: 'Prochlorococcus MED4 in PRO99 at 21C under continuous light at 27 umol photons m-2 s-1. Note:
        48h -Fe samples compared with 24h +Fe samples due to poor hybridization of 48h +Fe sample.'
      omics_type: MICROARRAY
      test_type: microarray_Cyber-T
      treatment_type: [iron]
      background_factors: [axenic, light]
      medium: PRO99 modified for trace-metal clean work, no added iron
      temperature: 21C
      light_condition: continuous light
      light_intensity: 27 umol photons m-2 s-1
      table_scope: significant_any_timepoint
    growth_medium_ironreplete_control_med4_med4_microarray:
      name: MED4 Iron-replete control (MED4) vs Iron starvation (MED4) (MICROARRAY)
      organism: Prochlorococcus MED4
      treatment_condition: Iron-replete control (MED4)
      control_condition: Iron starvation (MED4)
      experimental_context: Prochlorococcus MED4 in PRO99 at 21C under continuous light at 27 umol photons m-2 s-1. Iron added
        to -Fe cultures at 49h. R = log2(after rescue/before rescue).
      omics_type: MICROARRAY
      test_type: microarray_Cyber-T
      treatment_type: [iron]
      background_factors: [axenic, light]
      medium: PRO99 modified for trace-metal clean work, 1 uM Fe total
      temperature: 21C
      light_condition: continuous light
      light_intensity: 27 umol photons m-2 s-1
      table_scope: significant_any_timepoint
    iron_iron_starvation_mit9313_mit9313_microarray:
      name: MIT9313 Iron starvation (MIT9313) vs Iron-replete control (MIT9313) (MICROARRAY)
      organism: Prochlorococcus MIT9313
      treatment_condition: Iron starvation (MIT9313)
      control_condition: Iron-replete control (MIT9313)
      experimental_context: Prochlorococcus MIT9313 in PRO99 at 25C under continuous light at 20 umol photons m-2 s-1
      omics_type: MICROARRAY
      test_type: microarray_Cyber-T
      treatment_type: [iron]
      background_factors: [axenic, light]
      medium: PRO99 modified for trace-metal clean work, no added iron
      temperature: 25C
      light_condition: continuous light
      light_intensity: 20 umol photons m-2 s-1
      table_scope: significant_any_timepoint
    growth_medium_ironreplete_control_mit9313_mit9313_microarray:
      name: MIT9313 Iron-replete control (MIT9313) vs Iron starvation (MIT9313) (MICROARRAY)
      organism: Prochlorococcus MIT9313
      treatment_condition: Iron-replete control (MIT9313)
      control_condition: Iron starvation (MIT9313)
      experimental_context: Prochlorococcus MIT9313 in PRO99 at 25C under continuous light at 20 umol photons m-2 s-1. Iron
        added to -Fe cultures at 54h. R = log2(after rescue/before rescue).
      omics_type: MICROARRAY
      test_type: microarray_Cyber-T
      treatment_type: [iron]
      background_factors: [axenic, light]
      medium: PRO99 modified for trace-metal clean work, 1 uM Fe total
      temperature: 25C
      light_condition: continuous light
      light_intensity: 20 umol photons m-2 s-1
      table_scope: significant_any_timepoint
  supplementary_materials:
    med4_iron_response_clusters:
      type: gene_clusters
      name: MED4 iron-response hierarchical clusters (Thompson 2011 Fig 3)
      filename: data/Prochlorococcus/papers_and_supp/thompson 2011/supp table 1.csv
      organism: Prochlorococcus MED4
      gene_id_col: Gene
      cluster_col: Cluster
      id_columns:
      - column: Gene
        id_type: old_locus_tag
      cluster_type: time_course
      cluster_method: Hierarchical clustering (paper Figure 3)
      omics_type: MICROARRAY
      treatment_type: [iron]
      background_factors: [axenic, light]
      light_condition: continuous light
      treatment: Iron starvation (-Fe) and rescue (+Fe added at 49h) time course; samples at 0/12/24/48h plus rescue R
      experimental_context: Prochlorococcus MED4 in PRO99 (trace-metal clean) at 21C under continuous light at 27 umol photons m-2 s-1; clusters group genes by temporal expression profile across the full -Fe/+Fe time course
      figure_hint: Figure 3 (MED4 hierarchical cluster expression profiles); Supplementary Table 1
      experiments:
      - iron_iron_starvation_med4_med4_microarray_light
      - iron_iron_starvation_med4_med4_microarray_light_2
      - growth_medium_ironreplete_control_med4_med4_microarray
    mit9313_iron_response_clusters:
      type: gene_clusters
      name: MIT9313 iron-response hierarchical clusters (Thompson 2011 Fig 3)
      filename: data/Prochlorococcus/papers_and_supp/thompson 2011/supp table 2.csv
      organism: Prochlorococcus MIT9313
      gene_id_col: Gene
      cluster_col: Cluster
      id_columns:
      - column: Gene
        id_type: old_locus_tag
      cluster_type: time_course
      cluster_method: Hierarchical clustering (paper Figure 3)
      omics_type: MICROARRAY
      treatment_type: [iron]
      background_factors: [axenic, light]
      light_condition: continuous light
      treatment: Iron starvation (-Fe) and rescue (+Fe added at 54h) time course; samples at 0/16/28/53h plus rescue R
      experimental_context: Prochlorococcus MIT9313 in PRO99 (trace-metal clean) at 25C under continuous light at 20 umol photons m-2 s-1; clusters group genes by temporal expression profile across the full -Fe/+Fe time course
      figure_hint: Figure 3 (MIT9313 hierarchical cluster expression profiles); Supplementary Table 2
      experiments:
      - iron_iron_starvation_mit9313_mit9313_microarray
      - growth_medium_ironreplete_control_mit9313_mit9313_microarray
    supp_table_1:
      type: csv
      filename: data/Prochlorococcus/papers_and_supp/thompson 2011/supp table 1.csv
      id_columns:
      - column: Gene
        id_type: old_locus_tag
      product_columns:
      - column: Description
      statistical_analyses:
      - id: DE_iron_starvation_vs_replete_MED4_12h
        experiment: iron_iron_starvation_med4_med4_microarray_light
        timepoint: 12h
        timepoint_hours: 12.0
        growth_phase: acute_stress
        name_col: Gene
        logfc_col: '12'
        pvalue_threshold: 0.01
        logfc_threshold: 1.0
        pvalue_asterisk_in_logfc: true
      - id: DE_iron_starvation_vs_replete_MED4_24h
        experiment: iron_iron_starvation_med4_med4_microarray_light
        timepoint: 24h
        timepoint_hours: 24.0
        growth_phase: acute_stress
        name_col: Gene
        logfc_col: '24'
        pvalue_threshold: 0.01
        logfc_threshold: 1.0
        pvalue_asterisk_in_logfc: true
      - id: DE_iron_starvation_vs_replete_MED4_48h
        experiment: iron_iron_starvation_med4_med4_microarray_light_2
        timepoint: 48h
        timepoint_hours: 48.0
        growth_phase: nutrient_limited
        name_col: Gene
        logfc_col: '48'
        pvalue_threshold: 0.01
        logfc_threshold: 1.0
        pvalue_asterisk_in_logfc: true
      - id: DE_iron_rescue_MED4
        experiment: growth_medium_ironreplete_control_med4_med4_microarray
        timepoint: 'R (rescue: 70h vs 48h)'
        timepoint_hours: null
        growth_phase: recovery
        name_col: Gene
        logfc_col: R*
        pvalue_threshold: 0.01
        logfc_threshold: 1.0
        pvalue_asterisk_in_logfc: true
    supp_table_2:
      type: csv
      filename: data/Prochlorococcus/papers_and_supp/thompson 2011/supp table 2.csv
      id_columns:
      - column: Gene
        id_type: old_locus_tag
      product_columns:
      - column: Description
      statistical_analyses:
      - id: DE_iron_starvation_vs_replete_MIT9313_16h
        experiment: iron_iron_starvation_mit9313_mit9313_microarray
        timepoint: 16h
        timepoint_hours: 16.0
        growth_phase: acute_stress
        name_col: Gene
        logfc_col: '16'
        pvalue_threshold: 0.01
        logfc_threshold: 1.0
        pvalue_asterisk_in_logfc: true
      - id: DE_iron_starvation_vs_replete_MIT9313_28h
        experiment: iron_iron_starvation_mit9313_mit9313_microarray
        timepoint: 28h
        timepoint_hours: 28.0
        growth_phase: acute_stress
        name_col: Gene
        logfc_col: '28'
        pvalue_threshold: 0.01
        logfc_threshold: 1.0
        pvalue_asterisk_in_logfc: true
      - id: DE_iron_starvation_vs_replete_MIT9313_53h
        experiment: iron_iron_starvation_mit9313_mit9313_microarray
        timepoint: 53h
        timepoint_hours: 53.0
        growth_phase: nutrient_limited
        name_col: Gene
        logfc_col: '53'
        pvalue_threshold: 0.01
        logfc_threshold: 1.0
        pvalue_asterisk_in_logfc: true
      - id: DE_iron_rescue_MIT9313
        experiment: growth_medium_ironreplete_control_mit9313_mit9313_microarray
        timepoint: 'R (rescue: 72h vs 53h)'
        timepoint_hours: null
        growth_phase: recovery
        name_col: Gene
        logfc_col: R*
        pvalue_threshold: 0.01
        logfc_threshold: 1.0
        pvalue_asterisk_in_logfc: true
