  experiments:
    salt_stress_low_salinity_acclimation_28_natl1a_rnaseq:
      name: NATL1A Low salinity acclimation (28 psu) vs Normal seawater salinity (34 psu) (RNASEQ)
      organism: Prochlorococcus NATL1A
      treatment_condition: Low salinity acclimation (28 psu)
      control_condition: Normal seawater salinity (34 psu)
      experimental_context: Axenic Prochlorococcus NATL1A in Pro99 medium at 21C under continuous light (10 uE m-2 s-1), acclimated
        through five rounds of transfer
      omics_type: RNASEQ
      test_type: DESeq
      treatment_type: salt_stress
      medium: Pro99 natural seawater medium with reduced salinity
      temperature: 21C
      light_condition: continuous light
      light_intensity: 10 umol photons m-2 s-1
      table_scope: significant_only
      table_scope_detail: p < 0.05 and |logFC| > 1
    salt_stress_low_salinity_acclimation_28_med4_rnaseq:
