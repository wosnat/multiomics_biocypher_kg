publication:
  papername: "Beliaev 2014"
  papermainpdf: "data/Synechococcus/papers_and_supp/Beliaev 2014/Synechococcus-Shewanella co-culture transcriptome ISMEJ 2014.pdf"

  experiments:
    # Lactate co-culture vs axenic — Synechococcus side
    coculture_lactate_vs_axenic_syn7002_rnaseq:
      name: "Synechococcus 7002 coculture (lactate) vs axenic (SOLiD RNA-seq)"
      organism: "Synechococcus PCC 7002"
      treatment_condition: "Coculture with Shewanella W3-18-1 (lactate carbon source)"
      control_condition: "Axenic Synechococcus 7002 (high light, high O2)"
      experimental_context: "Carbon-limited chemostat co-culture at 30C, 1720 umol photons m-2 s-1, dilution rate 0.075 h-1, 5 mM D,L-Na lactate; SOLiD sequencing, RPKM normalization"
      omics_type: RNASEQ
      test_type: "RPKM_fold_change"
      treatment_type: ["coculture"]
      background_factors: ["light"]
      medium: "modified basal medium A with 5 mM D,L-Na lactate"
      temperature: "30C"
      light_condition: "continuous light"
      light_intensity: "1720 umol photons m-2 s-1"
      treatment_organism: "Shewanella sp. W3-18-1"
      treatment_taxid: 351745
      treatment_assembly_accession: "GCF_000015185.1"
      table_scope: significant_only
      table_scope_detail: "Genes with >=2-fold change in lactate co-culture vs axenic control"

    # Lactate co-culture vs axenic — Shewanella side
    coculture_lactate_vs_axenic_shew_w3181_rnaseq:
