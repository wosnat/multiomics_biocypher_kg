    # Lactate co-culture vs axenic
    supp_table_s3:
      type: csv
      filename: "data/Synechococcus/papers_and_supp/Beliaev 2014/table s3 41396_2014_bfismej201469_moesm40_esm.csv"
      skip_rows: 2
      organism: "Synechococcus PCC 7002"
      id_columns:
        - column: " Locus tag"
          id_type: locus_tag
        - column: "Gene abbreviation"
          id_type: gene_name
      product_columns:
        - column: "Curated Product Descriptor"
      statistical_analyses:
        - id: "syn7002_lactate_vs_axenic"
          experiment: coculture_lactate_vs_axenic_syn7002_rnaseq
          name_col: " Locus tag"
          logfc_col: "Fold change,                   Co-culture lactate                    vs.                                             axenic control"
