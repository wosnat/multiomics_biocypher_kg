  supplementary_materials:
    # ── Table S4a: Synechococcus WH7803 exoproteome in SW ──
    # Fold change values are signed ratios (positive = up vs day 1, negative = down vs day 1).
    # No values between 0 and 1 in downregulated direction — uses -X notation.
    # No fold_change_type — values pass through as-is (same convention as Oleza 2017).
    # Gene IDs are RefSeq protein accessions (YP_001223###.1) — will need protein-level
    # resolution in Phase 4. Neither organism is in KG yet.
    # CSV has 2 header rows before data header (title + blank line), skip_rows: 2.
    supp_table_s4a:
      type: csv
      filename: "data/Synechococcus/papers_and_supp/kaur 2018/table s4a Syn SW emi14012-sup-0004-suppinfo4.csv"
      skip_rows: 2
      organism: "Synechococcus WH7803"
      id_columns:
        - column: "NCBI reference"
          id_type: protein_id
        - column: "Other reference"
          id_type: old_locus_tag
      product_columns:
        - column: "Annotated function and designation"
      statistical_analyses:
        - id: "syn_wh7803_sw_tp3_vs_tp1"
          experiment: syn_wh7803_exoproteome_sw
          timepoint: "day 3"
          timepoint_hours: 72
          name_col: "NCBI reference"
          logfc_col: "Fold change comparison of time point 1 vs different time points. Time point 3 vs 1"
          adjusted_p_value_col: "q-value of time point 1 vs different time points. Time point 3 vs 1"
          pvalue_threshold: 0.05
        - id: "syn_wh7803_sw_tp7_vs_tp1"
          experiment: syn_wh7803_exoproteome_sw
          timepoint: "day 7"
          timepoint_hours: 168
          name_col: "NCBI reference"
