publication:
  papername: "Kaur 2018"
  papermainpdf: "data/Synechococcus/papers_and_supp/kaur 2018/Synechococcus-Ruegeria long term co-culture exoproteome EM 2018.pdf"

  experiments:
    # ── Synechococcus WH7803 exoproteome in natural seawater (SW) ──
    # 100-day coculture time course with R. pomeroyi DSS-3
    # Exoproteome collected after removing cells; nanoLC-ESI-MS/MS, Orbitrap Fusion
    # MaxQuant 1.5.5.1 + Perseus 1.5.5.3; label-free quantification
    # Two-sample Student's t-test (P=0.05), permutation-based FDR (q=0.05)
    # Fold changes compare each timepoint to timepoint 1 (day 1 baseline)
    syn_wh7803_exoproteome_sw:
      name: "Synechococcus WH7803 exoproteome time course in SW coculture with R. pomeroyi DSS-3"
      organism: "Synechococcus WH7803"
      treatment_condition: "Long-term coculture time course in natural oligotrophic seawater"
      control_condition: "Timepoint 1 (day 1) baseline"
      experimental_context: "100-day coculture of Synechococcus WH7803 and R. pomeroyi DSS-3 in filter-sterilized natural seawater (Gulf Stream), 22C, 10 umol photons m-2 s-1 continuous light, 140 rpm shaking, triplicate flasks, exoproteome collected by TCA precipitation of cell-free supernatant"
      omics_type: EXOPROTEOMICS
      test_type: "t-test_Perseus"
      treatment_type: ["coculture"]
      background_factors: ["light"]
      medium: "natural seawater (Gulf Stream)"
      temperature: "22C"
      light_condition: "continuous light"
      light_intensity: "10 umol photons m-2 s-1"
      treatment_organism: "Ruegeria pomeroyi DSS-3"
      treatment_taxid: 89184
      treatment_assembly_accession: "GCF_000011965.2"
      table_scope: all_detected_genes
      table_scope_detail: "All Synechococcus WH7803 proteins detected in SW exoproteome across all timepoints"

    # ── Synechococcus WH7803 exoproteome in artificial seawater (ASW) ──
    syn_wh7803_exoproteome_asw:
      name: "Synechococcus WH7803 exoproteome time course in ASW coculture with R. pomeroyi DSS-3"
      organism: "Synechococcus WH7803"
      treatment_condition: "Long-term coculture time course in nutrient-enriched artificial seawater"
      control_condition: "Timepoint 1 (day 1) baseline"
      experimental_context: "100-day coculture of Synechococcus WH7803 and R. pomeroyi DSS-3 in enriched ASW medium, 22C, 10 umol photons m-2 s-1 continuous light, 140 rpm shaking, triplicate flasks, exoproteome collected by TCA precipitation of cell-free supernatant"
      omics_type: EXOPROTEOMICS
      test_type: "t-test_Perseus"
      treatment_type: ["coculture"]
      background_factors: ["light"]
      medium: "ASW (enriched artificial seawater)"
      temperature: "22C"
      light_condition: "continuous light"
      light_intensity: "10 umol photons m-2 s-1"
      treatment_organism: "Ruegeria pomeroyi DSS-3"
      treatment_taxid: 89184
      treatment_assembly_accession: "GCF_000011965.2"
      table_scope: all_detected_genes
      table_scope_detail: "All Synechococcus WH7803 proteins detected in ASW exoproteome across all timepoints"

    # ── R. pomeroyi DSS-3 exoproteome in natural seawater (SW) ──
    rpom_dss3_exoproteome_sw:
      name: "R. pomeroyi DSS-3 exoproteome time course in SW coculture with Synechococcus WH7803"
      organism: "Ruegeria pomeroyi DSS-3"
